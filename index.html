<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BIGO Event Page</title>

<!-- Подключаем шрифт Exo 2 -->
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-color: #fefffd;
    --text-color: #2c3e50;
    --primary-color: #f5a631;
    --border-color: #e2e8f0;
  }

  body {
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: 'Exo 2', sans-serif;
    margin: 0;
    padding: 0;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
  }

  /* ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКОВ */
  .lang-switcher {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-bottom: 20px;
    position: sticky;
    top: 10px;
    z-index: 100;
  }
  .lang-btn {
    background: #fff;
    border: 2px solid var(--primary-color);
    color: var(--text-color);
    padding: 8px 16px;
    border-radius: 8px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    transition: 0.2s;
  }
  .lang-btn.active { background: var(--primary-color); color: #fff; }

  /* СТИЛИ ТЕКСТА И ЗАГОЛОВКОВ */
  .block-Title { font-size: 34px; font-weight: 800; text-align: center; margin: 30px 0 10px; color: #111; line-height: 1.2;}
  .block-Subtitle { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 25px; color: #666; }
  .block-H1 { font-size: 28px; font-weight: 800; margin: 30px 0 15px; border-bottom: 2px solid var(--primary-color); padding-bottom: 5px; display: inline-block;}
  .block-H2 { font-size: 22px; font-weight: 800; margin: 25px 0 10px; color: #1a202c;}
  .block-H3 { font-size: 18px; font-weight: 600; margin: 15px 0 10px; color: var(--primary-color);}
  .block-Text { font-size: 16px; margin-bottom: 15px; color: #4a5568;}
  
  /* ИНСТРУКЦИЯ */
  .block-Instruction {
    background: #fffaf0;
    border-left: 5px solid var(--primary-color);
    padding: 15px 20px;
    margin: 20px 0;
    border-radius: 0 8px 8px 0;
    font-weight: 600;
    color: #2d3748;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  /* ОДИНАРНОЕ ИЗОБРАЖЕНИЕ */
  .block-Image { text-align: center; margin: 20px 0; }
  .block-Image img { max-width: 100%; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

  /* СЕТКА КАРТОЧЕК (5 в ряд) */
  .grid-TableCard {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 15px;
    margin: 20px 0;
  }
  .card-item {
    background: #fff;
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 10px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .card-item img {
    width: 80%;
    aspect-ratio: 1/1;
    object-fit: contain;
    margin-bottom: 10px;
  }
  .card-item span { font-weight: 800; font-size: 13px; display: block; line-height: 1.2;}

  /* СЕТКА КНОПОК */
  .grid-Button {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin: 30px 0;
  }
  .btn-item {
    background: linear-gradient(135deg, #f5a631, #ff7a00);
    color: #fff;
    text-align: center;
    padding: 15px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 800;
    font-size: 16px;
    text-transform: uppercase;
    box-shadow: 0 5px 15px rgba(245, 166, 49, 0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-item:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(245, 166, 49, 0.6);}

  /* ТАБЛИЦА НАГРАД */
  .reward-table-container { margin: 20px 0; overflow-x: auto; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
  .reward-table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    min-width: 400px;
  }
  .reward-table th {
    background-color: #f7fafc;
    color: #2d3748;
    font-weight: 800;
    padding: 12px 15px;
    border: 1px solid var(--border-color);
    text-align: center;
    text-transform: uppercase;
    font-size: 13px;
  }
  .reward-table td {
    padding: 12px 15px;
    border: 1px solid var(--border-color);
    text-align: center;
    font-weight: 600;
    vertical-align: middle;
  }
  .reward-table tr:nth-child(even) { background-color: #fafbfc; }
  
  .reward-icon { width: 50px; height: 50px; object-fit: contain; display: block; margin: 0 auto; }

  .loading { text-align: center; padding: 50px; font-size: 20px; font-weight: 800; color: var(--primary-color); }

  /* МОБИЛЬНАЯ АДАПТАЦИЯ */
  @media (max-width: 768px) {
    .grid-TableCard { grid-template-columns: repeat(3, 1fr); gap: 10px;}
    .grid-Button { grid-template-columns: 1fr; gap: 10px;}
    .block-Title { font-size: 26px; }
    .block-H1 { font-size: 22px; }
    .block-H2 { font-size: 18px; }
    .card-item { padding: 8px; }
    .card-item span { font-size: 11px; }
  }
  @media (max-width: 480px) {
    .grid-TableCard { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

  <div class="container">
    <div class="lang-switcher">
      <button class="lang-btn active" id="btn-ru" onclick="switchLang('ru')">RU</button>
      <button class="lang-btn" id="btn-uz" onclick="switchLang('uz')">UZ</button>
    </div>

    <div id="content">
      <div class="loading">Загрузка данных... ⏳</div>
    </div>
  </div>

<script>
// ID ВАШЕЙ ТАБЛИЦЫ
const sheetID = "1YZh92BcRe-ctZjJNxnRCNgSCgw3i4UEuu6STb_06PUo";
const sheetGID = "0"; 

let currentLang = 'ru'; 
let pageData = [];

async function fetchData() {
  const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tq=SELECT%20A,B,C,D&gid=${sheetGID}&_=${Date.now()}`;
  
  try {
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substr(47).slice(0, -2));
    const rows = json.table.rows || [];

    pageData = rows.map(r => {
      return {
        block: r.c[0] ? String(r.c[0].v).trim() : "",
        style: r.c[1] ? String(r.c[1].v).trim() : "",
        ru: r.c[2] ? String(r.c[2].v).trim() : "",
        uz: r.c[3] ? String(r.c[3].v).trim() : ""
      };
    }).filter(item => item.style !== ""); 

    renderPage();
  } catch (e) {
    document.getElementById("content").innerHTML = `<div class="loading">❌ Ошибка загрузки данных</div>`;
    console.error(e);
  }
}

function switchLang(lang) {
  currentLang = lang;
  document.getElementById("btn-ru").classList.toggle("active", lang === 'ru');
  document.getElementById("btn-uz").classList.toggle("active", lang === 'uz');
  renderPage();
}

function renderPage() {
  const container = document.getElementById("content");
  let html = "";
  
  let inTableCardGrid = false;
  let inButtonGrid = false;
  let inRewardTable = false;

  // Закрытие тегов сеток/таблиц
  function closeGroups(currentStyle) {
    if (inTableCardGrid && currentStyle !== 'TableCard') { html += `</div>`; inTableCardGrid = false; }
    if (inButtonGrid && currentStyle !== 'Button') { html += `</div>`; inButtonGrid = false; }
    if (inRewardTable && currentStyle !== 'RewardTable') { html += `</tbody></table></div>`; inRewardTable = false; }
  }

  pageData.forEach((row) => {
    if (row.style.toLowerCase() === 'style') return; // Пропускаем заголовок таблицы

    let content = currentLang === 'ru' ? row.ru : row.uz;
    if (!content) content = row.ru; // Фолбэк на русский
    if (!content) return; 

    const style = row.style;
    closeGroups(style);

    switch(style) {
      case 'Title':
      case 'Subtitle':
      case 'H1':
      case 'H2':
      case 'H3':
      case 'Text':
        html += `<div class="block-${style}">${content.replace(/\n/g, '<br>')}</div>`;
        break;

      case 'Instruction':
        // Для инструкции переносы строк меняем на <br>
        html += `<div class="block-Instruction">${content.replace(/\n/g, '<br>')}</div>`;
        break;

      case 'Image':
        html += `<div class="block-Image"><img src="${content}" alt="Image"></div>`;
        break;

      case 'TableCard':
        if (!inTableCardGrid) {
          html += `<div class="grid-TableCard">`;
          inTableCardGrid = true;
        }
        // Делим строку по запятой на отдельные карточки
        let cards = content.split(',');
        cards.forEach(cardStr => {
          if(!cardStr.trim()) return;
          // Делим карточку по <br> на Имя и Ссылку
          let parts = cardStr.split('<br>');
          let cardName = parts[0] ? parts[0].trim() : '';
          let imgLink = parts[1] ? parts[1].trim() : '';
          
          html += `
            <div class="card-item">
              ${imgLink ? `<img src="${imgLink}" alt="item">` : ''}
              <span>${cardName}</span>
            </div>`;
        });
        break;

      case 'Button':
        if (!inButtonGrid) {
          html += `<div class="grid-Button">`;
          inButtonGrid = true;
        }
        // Делим кнопку по запятой
        let btnParts = content.split(',');
        let btnName = btnParts[0] ? btnParts[0].trim() : 'Кнопка';
        let btnLink = btnParts[1] ? btnParts[1].trim() : '#';
        html += `<a href="${btnLink}" target="_blank" class="btn-item">${btnName}</a>`;
        break;

      case 'RewardTable':
        let isHeader = false;
        if (!inRewardTable) {
          html += `<div class="reward-table-container"><table class="reward-table"><tbody>`;
          inRewardTable = true;
          isHeader = true; // Первая строка при открытии таблицы - это шапка
        }
        
        let cols = content.split(',');
        html += `<tr>`;
        cols.forEach(col => {
          let val = col.trim();
          let tag = isHeader ? 'th' : 'td';
          
          // Если значение начинается на http - выводим картинку, иначе текст
          if (val.startsWith('http')) {
            html += `<${tag}><img src="${val}" class="reward-icon" alt="reward"></${tag}>`;
          } else {
            html += `<${tag}>${val}</${tag}>`;
          }
        });
        html += `</tr>`;
        break;

      default:
        html += `<div>${content}</div>`;
        break;
    }
  });

  closeGroups('');
  container.innerHTML = html;
}

fetchData();
</script>
</body>
</html>
