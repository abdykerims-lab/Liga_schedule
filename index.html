<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Лига - Расписание и Результаты</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');

  :root {
    --bg-main: #3c126f;
    --bg-gradient: linear-gradient(135deg, #4f1893 0%, #3c126f 100%);
    --accent-color: #38bdf8;
    --accent-bg: rgba(56, 189, 248, 0.15);
    --accent-border: rgba(56, 189, 248, 0.4);
  }

  body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--bg-gradient);
    background-color: var(--bg-main);
    color: #fff;
    min-height: 100vh;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
  }

  * { box-sizing: border-box; }

  /* --- СТЕКЛО --- */
  .glass {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  }

  /* --- ШАПКА И ТАБЫ --- */
  .header { padding: 20px; text-align: center; }
  .tab-container { 
    display: inline-flex; 
    gap: 10px; 
    padding: 6px; 
    border-radius: 20px; 
    flex-wrap: wrap; 
    justify-content: center;
  }
  
  .tab {
    padding: 10px 20px;
    border-radius: 15px;
    font-weight: 600;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255, 255, 255, 0.7);
    cursor: pointer;
    transition: all 0.3s ease;
    border: 1px solid transparent;
  }

  .tab:hover { color: #fff; background: rgba(255, 255, 255, 0.1); }
  .tab.active {
    color: #fff;
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    box-shadow: 0 0 15px rgba(56, 189, 248, 0.25);
    cursor: default;
  }

  /* --- СЕТКА --- */
  .main-layout {
    display: flex; max-width: 1200px; margin: 0 auto;
    padding: 10px 20px 40px; gap: 20px; align-items: flex-start;
  }

  /* --- БОКОВОЕ МЕНЮ (ДАТЫ) --- */
  .sidebar { flex: 0 0 220px; display: flex; flex-direction: column; gap: 10px; transition: 0.3s;}
  
  .date-btn {
    padding: 12px 15px; border-radius: 12px; cursor: pointer; font-size: 15px;
    font-weight: 600; color: rgba(255, 255, 255, 0.7); transition: all 0.3s ease;
    border: 1px solid transparent; text-align: left;
  }
  .date-btn:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
  .date-btn.active {
    background: var(--accent-bg); 
    border: 1px solid var(--accent-border);
    color: #fff; 
    box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
  }

  /* --- ОСНОВНОЙ КОНТЕНТ --- */
  .content { flex: 1; width: 100%; display: flex; flex-direction: column; gap: 20px; min-width: 0; }

  /* --- ПОИСК --- */
  .search-box { padding: 12px 20px; border-radius: 15px; display: flex; align-items: center; }
  .search-box input {
    width: 100%; background: transparent; border: none;
    color: #fff; font-size: 16px; outline: none;
    font-family: 'Poppins', sans-serif;
  }
  .search-box input::placeholder { color: rgba(255,255,255,0.5); }

  /* --- ТЕКСТОВЫЕ СТИЛИ --- */
  .player-name { 
    font-weight: 700; font-size: 17px; color: #ffffff; display: block; 
    margin-bottom: 4px; letter-spacing: 0.5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;
  }
  .clan-name { 
    font-size: 13px; color: #cbd5e1; display: block; margin-bottom: 6px; font-weight: 400;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;
  }
  .clan-id { 
    font-family: monospace; font-size: 12px; color: var(--accent-color); 
    background: rgba(56, 189, 248, 0.15); padding: 3px 8px; 
    border-radius: 6px; border: 1px solid rgba(56, 189, 248, 0.3);
    display: inline-block; font-weight: 600; letter-spacing: 0.5px;
    max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .date-badge { 
    position: absolute; top: -10px; right: 15px; 
    background: var(--accent-color); color: #000; font-size: 11px; 
    padding: 4px 10px; border-radius: 8px; font-weight: 800;
  }

  /* --- СПИСКИ МАТЧЕЙ И РЕЗУЛЬТАТОВ --- */
  .schedule-list, .results-list { display: flex; flex-direction: column; gap: 12px; }
  
  .match-row, .result-row {
    padding: 15px 20px; border-radius: 15px; transition: transform 0.2s, background 0.2s; position: relative;
  }
  .match-row:hover, .result-row:hover { transform: translateX(5px); background: rgba(255, 255, 255, 0.1); }
  
  .match-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 15px; }
  .result-row { display: flex; align-items: center; gap: 15px; }

  .match-center { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .team-block { display: flex; flex-direction: column; line-height: 1.4; min-width: 0; }
  .team-block.left { text-align: left; align-items: flex-start; }
  .team-block.right { text-align: right; align-items: flex-end; }

  .time-badge {
    background: rgba(0, 0, 0, 0.5); padding: 6px 14px; border-radius: 8px;
    font-family: monospace; font-size: 15px; font-weight: bold;
    color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.3); 
  }
  .vs-text { 
    text-align: center; margin-top: 8px; font-style: normal; 
    color: #f43f5e; font-size: 14px; font-weight: 800; 
    text-transform: uppercase; letter-spacing: 1px;
  }

  /* Исправлен min-width вместо жесткого width, чтобы цифры не налезали на текст */
  .rank-box { font-size: 18px; font-weight: 800; color: #94a3b8; min-width: 45px; text-align: center; flex-shrink: 0; }
  .rank-1 { color: #fbbf24; font-size: 26px; text-shadow: 0 0 15px rgba(251, 191, 36, 0.6); }
  .rank-2 { color: #e2e8f0; font-size: 22px; text-shadow: 0 0 10px rgba(226, 232, 240, 0.4); }
  .rank-3 { color: #d97706; font-size: 20px; text-shadow: 0 0 10px rgba(217, 119, 6, 0.4); }

  .result-details { flex-grow: 1; text-align: left; min-width: 0; }
  .result-score-box { text-align: right; display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }
  
  .score-label { font-size: 11px; color: var(--accent-color); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
  .score-value { 
    font-family: monospace; font-size: 18px; font-weight: 800; color: #4ade80; 
    background: rgba(74, 222, 128, 0.15); padding: 4px 10px; 
    border-radius: 8px; border: 1px solid rgba(74, 222, 128, 0.3);
  }

  .eagle-img { height: 24px; width: auto; object-fit: contain; margin-top: 6px; border-radius: 4px; }
  .loading { text-align: center; padding: 40px; color: var(--accent-color); font-size: 18px; width: 100%; font-weight: 600; }

  /* ========================================= */
  /* --- МОБИЛЬНАЯ АДАПТАЦИЯ ---               */
  /* ========================================= */
  @media (max-width: 768px) {
    .header { padding: 15px 10px; }
    .tab-container { gap: 6px; border-radius: 15px;}
    .tab { width: calc(50% - 6px); padding: 10px 5px; font-size: 11px; letter-spacing: 0; flex: none;}
    
    .main-layout { flex-direction: column; padding: 10px; gap: 15px; }
    
    /* ИСПРАВЛЕНО: добавлено align-items: center, чтобы кнопки дат не вытягивались по высоте */
    .sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding-bottom: 5px; gap: 8px; scroll-snap-type: x mandatory; align-items: center; }
    .sidebar::-webkit-scrollbar { display: none; }
    /* ИСПРАВЛЕНО: добавлено flex: 0 0 auto, чтобы кнопки не вытягивались в ширину */
    .date-btn { flex: 0 0 auto; scroll-snap-align: start; white-space: nowrap; text-align: center; padding: 10px 16px; font-size: 13px; border-radius: 10px; }
    
    .content { gap: 12px; }
    .search-box { padding: 10px 15px; }
    .search-box input { font-size: 13px; }

    .match-row { padding: 12px 10px; gap: 6px; }
    .player-name { font-size: 14px; }
    .clan-name { font-size: 11px; margin-bottom: 4px;}
    .clan-id { font-size: 10px; padding: 2px 6px; }
    .time-badge { font-size: 13px; padding: 4px 8px; }
    .vs-text { font-size: 11px; margin-top: 4px; }
    
    .result-row { padding: 12px 10px; gap: 10px; }
    /* ИСПРАВЛЕНО: min-width вместо жесткого width, чтобы ранги не накладывались на имя */
    .rank-box { min-width: 35px; width: auto; font-size: 14px; }
    .rank-1 { font-size: 20px; }
    .rank-2 { font-size: 18px; }
    .rank-3 { font-size: 16px; }
    
    .score-value { font-size: 14px; padding: 3px 8px; }
    .score-label { font-size: 9px; }
    .eagle-img { height: 18px; margin-top: 4px; } 
  }
</style>
</head>
<body>

  <div class="header">
    <div class="glass tab-container">
      <div id="tab-schedule" class="tab active" onclick="switchTab('schedule')">Расписание</div>
      <div id="tab-results" class="tab" onclick="switchTab('results')">Результаты</div>
      <div id="tab-families" class="tab" onclick="switchTab('families')">Рейтинг Семей</div>
      <div id="tab-participants" class="tab" onclick="switchTab('participants')">Рейтинг Участников</div>
    </div>
  </div>

  <div class="main-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="content">
      <div class="search-box glass">
        <input type="text" id="searchInput" placeholder="Поиск (Имя, ID, Название)..." onkeyup="handleSearch()">
      </div>
      <div id="data-container">
        <div class="loading">Загрузка данных...</div>
      </div>
    </div>
  </div>

<script>
const sheetID = "1ine1ZqJrbK9kok_s7QujVLXhzj5hJuoKcguw8bQT2Jo";
let currentTab = "schedule"; 
let selectedDate = null;
let autoRefreshTimer = null;

const cache = {
  schedule: { dates: [], byDate: {}, loaded: false },
  results:  { dates: [], byDate: {}, loaded: false },
  families: { data: [], loaded: false },
  participants: { data: [], loaded: false }
};

function getVal(row, index) {
  if (!row || !row.c || !row.c[index]) return "";
  if (row.c[index].f) return String(row.c[index].f).trim();
  return String(row.c[index].v || "").trim();
}

function getNum(row, index) {
  if (!row || !row.c || !row.c[index]) return 0;
  const val = row.c[index].v;
  return typeof val === 'number' ? val : (Number(val) || 0);
}

function parseDate(val) {
  if (typeof val === "string" && val.startsWith("Date(")) {
    const match = val.match(/Date\((\d+),(\d+),(\d+)/);
    if (match) {
      const y = match[1];
      const m = String(Number(match[2]) + 1).padStart(2, "0");
      const d = String(match[3]).padStart(2, "0");
      return `${d}.${m}.${y}`;
    }
  }
  return val;
}

function formatTime(val) {
  if (Array.isArray(val)) return `${String(val[0]).padStart(2,"0")}:${String(val[1]).padStart(2,"0")}`;
  return val;
}

function parseToDateObj(str) {
  let parts = str.split('.');
  if (parts.length === 3) return new Date(parts[2], parts[1]-1, parts[0]);
  return new Date(0); 
}

function switchTab(tabName) {
  if (currentTab === tabName && cache[tabName].loaded) return;
  currentTab = tabName;
  
  document.getElementById("searchInput").value = "";

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tabName}`).classList.add("active");

  const sidebar = document.getElementById("sidebar");
  
  if (tabName === "families" || tabName === "participants") {
    sidebar.style.display = "none";
  } else {
    sidebar.style.display = "flex";
    sidebar.innerHTML = "";
  }

  document.getElementById("data-container").innerHTML = `<div class="loading">Загрузка данных...</div>`;

  if (cache[tabName].loaded) {
    if (tabName === "schedule" || tabName === "results") buildSidebar(false);
    else renderContent();
  } else {
    fetchData(tabName, false);
  }
}

function startAutoRefresh() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(() => {
    if (currentTab) fetchData(currentTab, true);
  }, 60000);
}

async function fetchData(tabName, isBackground = false) {
  let url = "";
  if (tabName === "schedule") url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tq=SELECT%20*&sheet=${encodeURIComponent("Расписание")}`;
  else if (tabName === "results") url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tq=SELECT%20*&sheet=${encodeURIComponent("Результаты 2.0")}`;
  else if (tabName === "families") url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tq=SELECT%20*&gid=1648616096`;
  else if (tabName === "participants") url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tq=SELECT%20*&gid=1546318279`;

  if (!isBackground) {
    document.getElementById("data-container").innerHTML = `<div class="loading">Загрузка данных...</div>`;
  }

  try {
    const res = await fetch(url + "&_=" + Date.now());
    const text = await res.text();
    const json = JSON.parse(text.substr(47).slice(0, -2));
    const rows = json.table.rows || [];

    if (tabName === "schedule") parseSchedule(rows);
    else if (tabName === "results") parseResults(rows);
    else if (tabName === "families") parseFamilies(rows);
    else if (tabName === "participants") parseParticipants(rows);

    cache[tabName].loaded = true;
    
    if (tabName === "schedule" || tabName === "results") {
      buildSidebar(isBackground);
    } else {
      if (document.getElementById("searchInput").value.trim() !== "") handleSearch();
      else renderContent();
    }
  } catch (e) {
    if (!isBackground) document.getElementById("data-container").innerHTML = `<div class="loading" style="color:#f43f5e;">Ошибка загрузки</div>`;
  }
}

/* --- ПАРСЕРЫ --- */
function parseSchedule(rows) {
  cache.schedule.dates = []; cache.schedule.byDate = {};
  rows.forEach(r => {
    let date = parseDate(getVal(r, 0));
    if (!date || date.toLowerCase() === "дата") return;
    let time = formatTime(getVal(r, 1)) || "--:--";
    let colD = getVal(r, 3), colE = getVal(r, 4), colF = getVal(r, 5);
    let c2_name = getVal(r, 8) || "Без клана", c2_id = getVal(r, 9) || "0000", p2 = getVal(r, 10) || "Неизвестно";    
    let searchStr = `${colD} ${colE} ${colF} ${p2} ${c2_id} ${c2_name}`.toLowerCase();

    if (!cache.schedule.byDate[date]) { cache.schedule.byDate[date] = []; cache.schedule.dates.push(date); }
    cache.schedule.byDate[date].push({ time, p1: colD || "Неизвестно", c1_id: colE || "0000", c1_name: colF || "Без клана", p2, c2_id, c2_name, searchStr });
  });
  cache.schedule.dates.sort((a, b) => parseToDateObj(b) - parseToDateObj(a));
  for (let d in cache.schedule.byDate) cache.schedule.byDate[d].sort((a, b) => a.time.localeCompare(b.time));
}

function parseResults(rows) {
  cache.results.dates = []; cache.results.byDate = {};
  rows.forEach(r => {
    let date = parseDate(getVal(r, 0));
    if (!date || date.toLowerCase() === "дата") return;
    let colC = getVal(r, 2), colF = getVal(r, 5), colG = getVal(r, 6);
    let scoreNum = Number(getVal(r, 7)) || 0, scoreStr = getVal(r, 7) || "0"; 
    
    let eagleImgSrc = scoreNum >= 500000 ? "https://i.ibb.co/p6fLVxMk/Golden-1.png" : (scoreNum >= 50000 ? "https://i.ibb.co/m5fQzxRp/Silver-1.png" : "https://i.ibb.co/zWmzPJJg/no-eagel.jpg");
    let searchStr = `${colC} ${colF} ${colG}`.toLowerCase();

    if (!cache.results.byDate[date]) { cache.results.byDate[date] = []; cache.results.dates.push(date); }
    cache.results.byDate[date].push({ colC, colF, colG, scoreNum, scoreStr, eagleImgSrc, searchStr });
  });
  cache.results.dates.sort((a, b) => parseToDateObj(b) - parseToDateObj(a));
  for (let d in cache.results.byDate) cache.results.byDate[d].sort((a, b) => b.scoreNum - a.scoreNum);
}

function parseFamilies(rows) {
  cache.families.data = [];
  rows.forEach((r, index) => {
    if (index === 0) return; 
    let id = getVal(r, 1);   // B
    let name = getVal(r, 2); // C
    let score = getVal(r, 3); // D 
    let scoreNum = getNum(r, 3); // D 
    if (!name && !id) return;
    
    let searchStr = `${id} ${name}`.toLowerCase();
    cache.families.data.push({ id, name, score, scoreNum, searchStr });
  });

  cache.families.data.sort((a, b) => b.scoreNum - a.scoreNum);
  
  cache.families.data.forEach((item, idx) => {
    item.globalRank = idx + 1;
  });
}

function parseParticipants(rows) {
  cache.participants.data = [];
  rows.forEach((r, index) => {
    if (index === 0) return; 
    let name = getVal(r, 2);   // C
    let family = getVal(r, 4); // E
    let score = getVal(r, 3);  // D 
    let scoreNum = getNum(r, 3); // D 
    if (!name) return;
    
    let searchStr = `${name} ${family}`.toLowerCase();
    cache.participants.data.push({ name, family, score, scoreNum, searchStr });
  });

  cache.participants.data.sort((a, b) => b.scoreNum - a.scoreNum);

  cache.participants.data.forEach((item, idx) => {
    item.globalRank = idx + 1;
  });
}

/* --- ОТОБРАЖЕНИЕ UI --- */
function buildSidebar(isBackground = false) {
  const dataRef = cache[currentTab];
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";

  if (dataRef.dates.length === 0) {
    document.getElementById("data-container").innerHTML = `<div class="loading">Нет данных</div>`;
    return;
  }

  if (!isBackground || !dataRef.dates.includes(selectedDate)) selectedDate = dataRef.dates[0];

  dataRef.dates.forEach((date) => {
    const btn = document.createElement("div");
    btn.className = "date-btn glass";
    if (date === selectedDate) btn.classList.add("active");
    btn.innerText = date;
    btn.onclick = () => selectDate(date);
    sidebar.appendChild(btn);
  });
  
  if (document.getElementById("searchInput").value.trim() !== "") handleSearch();
  else renderContent();
}

function selectDate(date) {
  selectedDate = date;
  document.getElementById("searchInput").value = ""; 
  document.querySelectorAll(".date-btn").forEach(btn => {
    btn.classList.toggle("active", btn.innerText === selectedDate);
  });
  renderContent();
}

function handleSearch() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  renderContent(q);
}

function renderContent(searchQuery = "") {
  const container = document.getElementById("data-container");
  const dataRef = cache[currentTab];
  let html = "";
  let itemsToRender = [];

  if (currentTab === "schedule" || currentTab === "results") {
    if (searchQuery !== "") {
      const searchTerms = searchQuery.split(" ").filter(t => t !== "");
      dataRef.dates.forEach(d => {
        dataRef.byDate[d].forEach(item => {
          if (searchTerms.every(term => item.searchStr.includes(term))) itemsToRender.push({ ...item, dateLabel: d });
        });
      });
      document.querySelectorAll(".date-btn").forEach(btn => btn.classList.remove("active"));
    } else {
      itemsToRender = dataRef.byDate[selectedDate] || [];
    }
  } else {
    if (searchQuery !== "") {
      const searchTerms = searchQuery.split(" ").filter(t => t !== "");
      itemsToRender = dataRef.data.filter(item => searchTerms.every(term => item.searchStr.includes(term)));
    } else {
      itemsToRender = dataRef.data || [];
    }
  }

  if (itemsToRender.length === 0) {
    container.innerHTML = `<div class="loading">Ничего не найдено</div>`;
    return;
  }

  if (currentTab === "schedule") {
    html += `<div class="schedule-list">`;
    itemsToRender.forEach(m => {
      let dateBadge = searchQuery !== "" ? `<div class="date-badge">${m.dateLabel}</div>` : "";
      html += `
        <div class="match-row glass">
          ${dateBadge}
          <div class="team-block left">
            <span class="player-name">${m.p1}</span>
            <span class="clan-name">${m.c1_name}</span>
            <span class="clan-id">ID: ${m.c1_id}</span>
          </div>
          <div class="match-center">
            <div class="time-badge">${m.time}</div>
            <div class="vs-text">VS</div>
          </div>
          <div class="team-block right">
            <span class="player-name">${m.p2}</span>
            <span class="clan-name">${m.c2_name}</span>
            <span class="clan-id">ID: ${m.c2_id}</span>
          </div>
        </div>`;
    });
    html += `</div>`;
  } 
  
  else if (currentTab === "results") {
    html += `<div class="results-list">`;
    itemsToRender.forEach((m, index) => {
      let dateBadge = searchQuery !== "" ? `<div class="date-badge">${m.dateLabel}</div>` : "";
      let rankClass = index === 0 ? "rank-1" : (index === 1 ? "rank-2" : (index === 2 ? "rank-3" : ""));
      html += `
        <div class="result-row glass">
          ${dateBadge}
          <div class="rank-box ${rankClass}">#${index + 1}</div>
          <div class="result-details">
            <span class="player-name">${m.colF}</span>
            <span class="clan-name">BIGO ID: ${m.colG}</span>
            <span class="clan-id">ID: ${m.colC}</span>
          </div>
          <div class="result-score-box">
            <span class="score-label">ПК Очки</span>
            <span class="score-value">${m.scoreStr}</span>
            <img src="${m.eagleImgSrc}" class="eagle-img" loading="lazy" alt="Eagle">
          </div>
        </div>`;
    });
    html += `</div>`;
  }

  else if (currentTab === "families") {
    html += `<div class="results-list">`;
    itemsToRender.forEach((m) => {
      let r = m.globalRank; 
      let rankClass = r === 1 ? "rank-1" : (r === 2 ? "rank-2" : (r === 3 ? "rank-3" : ""));
      html += `
        <div class="result-row glass">
          <div class="rank-box ${rankClass}">#${r}</div>
          <div class="result-details">
            <span class="player-name">${m.name}</span>
            <span class="clan-id">Family ID: ${m.id}</span>
          </div>
          <div class="result-score-box">
            <span class="score-label">Очки Семьи</span>
            <span class="score-value">${m.score}</span>
          </div>
        </div>`;
    });
    html += `</div>`;
  }

  else if (currentTab === "participants") {
    html += `<div class="results-list">`;
    itemsToRender.forEach((m) => {
      let r = m.globalRank;
      let rankClass = r === 1 ? "rank-1" : (r === 2 ? "rank-2" : (r === 3 ? "rank-3" : ""));
      html += `
        <div class="result-row glass">
          <div class="rank-box ${rankClass}">#${r}</div>
          <div class="result-details">
            <span class="player-name">${m.name}</span>
            <span class="clan-name">${m.family ? "Семья: " + m.family : "Без семьи"}</span>
          </div>
          <div class="result-score-box">
            <span class="score-label">Очки Участника</span>
            <span class="score-value">${m.score}</span>
          </div>
        </div>`;
    });
    html += `</div>`;
  }

  container.innerHTML = html;
}

switchTab("schedule");
startAutoRefresh();
</script>
</body>
</html>
