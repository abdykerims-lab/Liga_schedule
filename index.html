<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Семейные Рейтинги и Награды</title>
<style>
  body {
    font-family: monospace;
    margin: 0 auto;
    padding: 12px;
    background: #fff9f9; /* ВАШ НОВЫЙ ФОН */
    color: #2d1b1b; /* Теплый темный цвет текста вместо чистого черного */
    max-width: 600px; /* Ограничитель для ПК (мобильный вид) */
    -webkit-font-smoothing: antialiased;
  }

  /* --- ТАБЫ (ВКЛАДКИ) --- */
  .tabs {
    display: flex;
    background: #f5ecec; /* Теплая подложка под вкладки */
    border-radius: 12px;
    padding: 5px;
    margin-bottom: 15px;
  }
  .tab-btn {
    flex: 1;
    text-align: center;
    padding: 10px;
    border: none;
    background: transparent;
    font-family: monospace;
    font-size: 14px;
    font-weight: bold;
    color: #887070; /* Мягкий цвет неактивной кнопки */
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .tab-btn.active {
    background: #ffffff;
    color: #2d1b1b;
    box-shadow: 0 2px 8px rgba(120, 80, 80, 0.1); /* Мягкая теплая тень */
  }

  #date {
    text-align: center;
    font-size: 12px;
    margin-bottom: 12px;
    color: #887070;
    min-height: 14px;
  }

  /* --- ПОИСК --- */
  #search {
    width: 100%;
    box-sizing: border-box;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #e6d5d5; /* Теплая граница */
    background: #ffffff;
    margin-bottom: 15px;
    font-family: monospace;
    font-size: 14px;
    color: #2d1b1b;
    outline: none;
    transition: all 0.3s ease;
    -webkit-appearance: none; 
  }
  #search::placeholder { color: #bcaeae; }
  #search:focus { 
    border-color: #d4af37; 
    box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15); /* Золотое свечение при фокусе */
  }

  /* --- КАРТОЧКИ --- */
  .card {
    background: #ffffff;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: 0 4px 12px rgba(120, 80, 80, 0.06); /* Теплая легкая тень */
    font-size: 13px;
  }

  /* --- ЦВЕТА ТОПОВ --- */
  .top1 { border-left: 6px solid #d4af37; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2); }
  .top2 { border-left: 6px solid #a0a0a0; }
  .top3 { border-left: 6px solid #a97142; }
  .top4 { border-left: 6px solid #c9a227; box-shadow: 0 4px 10px rgba(201, 162, 39, 0.12); }
  .top5_10 { border-left: 6px solid #4a90e2; box-shadow: 0 4px 10px rgba(74, 144, 226, 0.15); }
  .top11_20 { border-left: 6px solid #4ade80; box-shadow: 0 4px 10px rgba(74, 222, 128, 0.2); }

  /* --- БЕЙДЖИ --- */
  .rank-badge {
    display: inline-block;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: bold;
    flex-shrink: 0; /* Запрещаем бейджу сжиматься */
  }
  .rank1 { background: #d4af37; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }
  .rank2 { background: #e0e0e0; color: #333; }
  .rank3 { background: #a97142; color: #fff; }
  .rank4 { background: #f0e2b6; color: #8a6a1c; }
  .rank5_10 { background: #e6f0fa; color: #2b6cb0; font-size: 9.5px; }
  .rank11_20 { background: #e6f9ec; color: #1b7a43; font-size: 9.5px; }

  /* --- СТРОКИ И ЗАЩИТА ОТ ПЕРЕНОСОВ --- */
  .row { 
    display: flex; 
    justify-content: space-between; 
    align-items: center;
    margin-top: 6px; 
    gap: 10px;
  }
  
  /* Блок заголовка: имя обрезается, бейдж остается целым */
  .row-title {
    display: flex;
    align-items: center;
    width: 100%;
    min-width: 0; /* Обязательно для работы ellipsis внутри flex */
  }
  .row-title b {
    white-space: nowrap; 
    overflow: hidden; 
    text-overflow: ellipsis; 
    flex-shrink: 1;
    margin-right: 8px;
    font-size: 14px;
  }

  .label { color: #887070; white-space: nowrap; }
  .value { font-weight: bold; text-align: right; white-space: nowrap; }

  /* Текстовые акценты */
  .green { color: #208b3a; }
  .red   { color: #d32f2f; }
  .gold  { color: #b8860b; }
  .loading { text-align: center; color: #887070; padding: 30px; font-weight: bold; }
</style>
</head>
<body>

  <!-- Вкладки -->
  <div class="tabs">
    <button id="btn-rewards" class="tab-btn active" onclick="switchTab('rewards')">👑 Награды</button>
    <button id="btn-eagle" class="tab-btn" onclick="switchTab('eagle')">🦅 Орёл</button>
  </div>

  <div id="date"></div>
  <input type="text" id="search" placeholder="Поиск (ID семьи или название)..." oninput="handleSearch()">
  <div id="cards"></div>

<script>
const sheetID = "1ZqicxQ458QCEFhvFi0skekdBSfegq0Qlm6uNEJn1tA8";

const config = {
  rewards: { gid: "0", data: [], loaded: false },
  eagle:   { gid: "337717848", data: [], loaded: false }
};

let currentTab = "rewards"; 

function v(r, i) {
  return r.c && r.c[i] ? r.c[i].v : "";
}

function formatDate(val) {
  if (!val) return "";
  if (typeof val === "string" && val.includes("Date")) {
    const match = val.match(/Date\((\d+),(\d+),(\d+)\)/);
    if (match) {
      const y = match[1];
      const m = String(Number(match[2]) + 1).padStart(2, "0");
      const d = String(match[3]).padStart(2, "0");
      return `${d}.${m}.${y}`;
    }
  }
  return String(val);
}

function switchTab(tab) {
  if (currentTab === tab) return;
  currentTab = tab;

  document.getElementById("btn-rewards").classList.remove("active");
  document.getElementById("btn-eagle").classList.remove("active");
  document.getElementById(`btn-${tab}`).classList.add("active");

  document.getElementById("search").value = "";
  
  if (config[tab].loaded) {
    applySearchAndRender();
  } else {
    loadData(tab);
  }
}

async function loadData(tab) {
  const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?gid=${config[tab].gid}&tq=SELECT%20*`;
  
  if (currentTab === tab) {
    document.getElementById("cards").innerHTML = "<div class='loading'>Загрузка данных...</div>";
  }

  try {
    const res = await fetch(url + "&_=" + Date.now());
    const text = await res.text();
    const json = JSON.parse(text.substr(47).slice(0, -2));
    config[tab].data = json.table.rows || [];
    config[tab].loaded = true;

    if (currentTab === tab) {
      applySearchAndRender();
    }
  } catch (e) {
    console.error("Ошибка загрузки", e);
    if (currentTab === tab) {
      document.getElementById("cards").innerHTML = "<div class='loading red'>Ошибка загрузки данных</div>";
    }
  }
}

function handleSearch() {
  applySearchAndRender();
}

function applySearchAndRender() {
  const val = document.getElementById("search").value.toLowerCase().trim();
  const rows = config[currentTab].data;

  const dateEl = document.getElementById("date");
  if (currentTab === "rewards" && rows.length > 0) {
    const updateDate = formatDate(v(rows[0], 0)) || "13.04.2026";
    dateEl.innerText = `Данные обновлены: ${updateDate}`;
    dateEl.style.display = "block";
  } else {
    dateEl.style.display = "none";
  }

  let filtered = rows;
  if (val) {
    filtered = rows.filter(r => {
      let id, name;
      if (currentTab === "rewards") {
        id = String(v(r, 2)).toLowerCase();
        name = String(v(r, 4)).toLowerCase();
      } else {
        id = String(v(r, 0)).toLowerCase();
        name = String(v(r, 2)).toLowerCase();
      }
      return id.includes(val) || name.includes(val);
    });
  }

  if (currentTab === "rewards") {
    renderRewards(filtered);
  } else {
    renderEagle(filtered);
  }
}

function renderRewards(rows) {
  let html = "";
  rows.forEach(r => {
    const place = Number(v(r, 1)) || 0;
    const id = v(r, 2);
    const topup = Number(v(r, 3)) || 0;
    const name = v(r, 4);
    const eagle = v(r, 12);
    const kpi = v(r, 13);
    const reward = Number(v(r, 14)) || 0;
    const nextTopup = Number(v(r, 16)) || 0;
    const nextReward = Number(v(r, 17)) || 0;

    let rankClass = "", badge = "", crown = "", icon = "";

    if (place === 1) { rankClass = "top1"; badge = `<span class="rank-badge rank1">TOP 1</span>`; crown = "👑 "; } 
    else if (place === 2) { rankClass = "top2"; badge = `<span class="rank-badge rank2">TOP 2</span>`; } 
    else if (place === 3) { rankClass = "top3"; badge = `<span class="rank-badge rank3">TOP 3</span>`; } 
    else if (place === 4) { rankClass = "top4"; badge = `<span class="rank-badge rank4">TOP 4</span>`; } 
    else if (place >= 5 && place <= 10) { rankClass = "top5_10"; badge = `<span class="rank-badge rank5_10">TOP 5-10</span>`; } 
    else if (place >= 11 && place <= 20) { rankClass = "top11_20"; badge = `<span class="rank-badge rank11_20">TOP 11-20</span>`; }

    const topupClass = topup > 2000000 ? "green" : (topup > 800000 ? "" : "red");
    const rewardClass = reward >= 100000 ? "green" : (reward >= 50000 ? "" : "red");

    html += `
    <div class="card ${rankClass}">
      <div class="row">
        <!-- БЛОК С ЗАЩИТОЙ ОТ ПЕРЕНОСОВ -->
        <div class="row-title"><b>#${place} ${crown}${icon}${name}</b> ${badge}</div>
      </div>
      <div class="row">
        <div></div>
        <div class="value">${kpi || "—"}</div>
      </div>
      <div class="row">
        <div class="label">ID семьи</div>
        <div class="value">${id}</div>
      </div>
      <div class="row">
        <div class="label">Пополнение 💎</div>
        <div class="value ${topupClass}">${topup.toLocaleString('ru-RU')}</div>
      </div>
      <div class="row">
        <div class="label">Текущая награда</div>
        <div class="value ${rewardClass}">${reward.toLocaleString('ru-RU')}</div>
      </div>
      <div class="row">
        <div class="label">Орел</div>
        <div class="value">${eagle || "—"}</div>
      </div>
      <div class="row">
        <div class="label">Следующий порог</div>
        <div class="value gold">${nextTopup.toLocaleString('ru-RU')}</div>
      </div>
      <div class="row">
        <div class="label">Следующая награда</div>
        <div class="value gold">${nextReward.toLocaleString('ru-RU')}</div>
      </div>
    </div>`;
  });
  document.getElementById("cards").innerHTML = html || "<div class='loading'>Ничего не найдено</div>";
}

function renderEagle(rows) {
  let html = "";
  rows.forEach(r => {
    const place = Number(v(r, 1)) || 0;
    const familyName = v(r, 2);
    const familyId = v(r, 0);
    const needPoints = Number(v(r, 5)) || 0;
    const eagle = v(r, 12);
    const familyLiga = v(r, 11);
    const familyPK = v(r, 10);

    let rankClass = "", badge = "", crown = "", icon = "";

    if (place === 1) { rankClass = "top1"; badge = `<span class="rank-badge rank1">TOP 1</span>`; crown = "👑 "; } 
    else if (place === 2) { rankClass = "top2"; badge = `<span class="rank-badge rank2">TOP 2</span>`; } 
    else if (place === 3) { rankClass = "top3"; badge = `<span class="rank-badge rank3">TOP 3</span>`; } 
    else if (place === 4) { rankClass = "top4"; badge = `<span class="rank-badge rank4">TOP 4</span>`; } 
    else if (place >= 5 && place <= 10) { rankClass = "top5_10"; badge = `<span class="rank-badge rank5_10">TOP 5-10</span>`; icon = "🔵 "; } 
    else if (place >= 11 && place <= 20) { rankClass = "top11_20"; badge = `<span class="rank-badge rank11_20">TOP 11-20</span>`; }

    const needPointsClass = needPoints > 0 ? "red" : "gold";

    html += `
    <div class="card ${rankClass}">
      <div class="row">
        <!-- БЛОК С ЗАЩИТОЙ ОТ ПЕРЕНОСОВ -->
        <div class="row-title"><b>${crown}${icon}${familyName}</b> ${badge}</div>
      </div>
      <div class="row">
        <div class="label">ID семьи</div>
        <div class="value">${familyId}</div>
      </div>
      <div class="row">
        <div class="label">Орел</div>
        <div class="value">${eagle || "—"}</div>
      </div>
      <div class="row">
        <div class="label">Семейная Лига</div>
        <div class="value">${familyLiga || "—"}</div>
      </div>
      <div class="row">
        <div class="label">Семейный ПК</div>
        <div class="value">${familyPK || "—"}</div>
      </div>
      <div class="row">
        <div class="label">Нужно очков</div>
        <div class="value ${needPointsClass}">${needPoints.toLocaleString('ru-RU')}</div>
      </div>
    </div>`;
  });
  document.getElementById("cards").innerHTML = html || "<div class='loading'>Ничего не найдено</div>";
}

setInterval(() => {
  loadData(currentTab);
}, 60000);

loadData("rewards");
</script>
</body>
</html>
