<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лига - Расписание и Результаты</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

  body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #15092a 0%, #3b1454 100%);
    color: #fff;
    min-height: 100vh;
    box-sizing: border-box;
  }

  * { box-sizing: border-box; }

  /* --- GLASSMORPHISM --- */
  .glass {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }

  /* --- HEADER & TABS --- */
  .header { padding: 20px; text-align: center; }
  .tab-container { display: inline-flex; gap: 10px; padding: 5px; border-radius: 20px; }
  
  .tab {
    padding: 10px 25px;
    border-radius: 15px;
    font-weight: 600;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #fff;
    cursor: pointer;
    opacity: 0.6;
    transition: all 0.3s ease;
    border: 1px solid transparent;
  }

  .tab:hover { opacity: 1; background: rgba(255, 255, 255, 0.1); }
  .tab.active {
    opacity: 1;
    background: rgba(168, 85, 247, 0.4);
    border: 1px solid rgba(168, 85, 247, 0.6);
    box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
    cursor: default;
  }

  /* --- LAYOUT --- */
  .main-layout {
    display: flex; max-width: 1200px; margin: 0 auto;
    padding: 10px 20px 40px; gap: 20px; align-items: flex-start;
  }

  /* --- SIDEBAR --- */
  .sidebar { flex: 0 0 220px; display: flex; flex-direction: column; gap: 10px; }
  
  .date-btn {
    padding: 12px 15px; border-radius: 12px; cursor: pointer; font-size: 15px;
    font-weight: 600; color: #d8b4fe; transition: all 0.3s ease;
    border: 1px solid transparent; text-align: left;
  }
  .date-btn:hover { background: rgba(255, 255, 255, 0.1); }
  .date-btn.active {
    background: rgba(168, 85, 247, 0.3); border: 1px solid rgba(168, 85, 247, 0.6);
    color: #fff; box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
  }

  .content { flex: 1; width: 100%; display: flex; flex-direction: column; gap: 20px; }

  /* --- SEARCH BAR --- */
  .search-box {
    padding: 12px 20px;
    border-radius: 15px;
    display: flex;
    align-items: center;
  }
  .search-box input {
    width: 100%; background: transparent; border: none;
    color: #fff; font-size: 16px; outline: none;
    font-family: 'Poppins', sans-serif;
  }
  .search-box input::placeholder { color: rgba(255,255,255,0.4); }

  /* --- SCHEDULE (Tab 1) - НОВЫЙ ДИЗАЙН ШРИФТОВ И ЦВЕТОВ --- */
  .schedule-list { display: flex; flex-direction: column; gap: 12px; }
  
  .match-row {
    padding: 15px 20px; 
    border-radius: 15px; 
    display: grid; 
    grid-template-columns: 1fr auto 1fr; 
    align-items: center; 
    gap: 15px;
    transition: transform 0.2s, background 0.2s;
    position: relative;
  }
  .match-row:hover { transform: translateX(5px); background: rgba(255, 255, 255, 0.08); }
  
  .match-center { display: flex; flex-direction: column; align-items: center; justify-content: center; }

  /* Время - статусное золотое */
  .time-badge {
    background: rgba(0, 0, 0, 0.4); padding: 5px 14px; border-radius: 8px;
    font-family: monospace; font-size: 15px; font-weight: bold;
    color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.3); 
  }
  
  .team-block { display: block; line-height: 1.4; }
  .team-block.left { text-align: left; }
  .team-block.right { text-align: right; }
  
  /* Игрок - крупный и белый */
  .player-name { font-weight: 600; font-size: 16px; color: #ffffff; display: block; margin-bottom: 2px; letter-spacing: 0.5px; }
  
  /* Клан - приглушенный серебристый */
  .clan-name { font-size: 13px; color: #94a3b8; display: block; margin-bottom: 5px; }
  
  /* ID - неоново-голубой бейджик */
  .clan-id { 
    font-family: monospace; font-size: 12px; color: #38bdf8; 
    background: rgba(56, 189, 248, 0.1); padding: 2px 6px; 
    border-radius: 6px; border: 1px solid rgba(56, 189, 248, 0.2);
  }

  /* VS - строгий красный */
  .vs-text { 
    text-align: center; margin-top: 8px; font-style: normal; 
    color: #f43f5e; font-size: 14px; font-weight: 800; 
    text-transform: uppercase; letter-spacing: 1px;
  }

  .date-badge { 
    position: absolute; top: -10px; right: 15px; 
    background: #a855f7; color: #fff; font-size: 11px; 
    padding: 4px 8px; border-radius: 8px; font-weight: bold;
  }

  /* --- RESULTS (Tab 2) --- */
  .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
  
  .result-card-v2 {
    padding: 24px; border-radius: 16px; text-align: center;
    transition: transform 0.2s; position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .result-card-v2:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.3); }

  .result-card-v2 h4 { margin: 0 0 8px 0; color: #cbd5e1; font-size: 14px; font-weight: 400; }
  .result-card-v2 h2 { margin: 0 0 8px 0; color: #fff; font-size: 22px; font-weight: 800; }
  .result-card-v2 h3 { margin: 0 0 15px 0; color: #a855f7; font-size: 16px; font-weight: 600; }
  .result-card-v2 .pk-score { 
    margin: auto 0 0 0; color: #fbbf24; background: rgba(251, 191, 36, 0.1); 
    padding: 6px 15px; border-radius: 8px; border: 1px solid rgba(251,191,36,0.3);
  }

  .loading { text-align: center; padding: 40px; color: #a78bfa; font-size: 18px; width: 100%; }

  /* --- МОБИЛЬНАЯ АДАПТАЦИЯ --- */
  @media (max-width: 768px) {
    .header { padding: 15px 10px; }
    .tab { padding: 8px 15px; font-size: 13px; }
    
    .main-layout { flex-direction: column; padding: 10px; gap: 15px; }
    .sidebar { flex: none; width: 100%; flex-direction: row; overflow-x: auto; padding-bottom: 5px; gap: 8px; }
    .date-btn { white-space: nowrap; text-align: center; padding: 8px 12px; font-size: 13px; border-radius: 10px; }
    
    .content { gap: 15px; }
    .search-box { padding: 10px 15px; }
    .search-box input { font-size: 14px; }

    /* Таб 1 Мобильный вид (уменьшенные новые шрифты) */
    .match-row { padding: 12px 10px; gap: 10px; }
    .player-name { font-size: 14px; }
    .clan-name { font-size: 11px; margin-bottom: 4px;}
    .clan-id { font-size: 10px; padding: 2px 4px; }
    .time-badge { font-size: 13px; padding: 4px 10px; }
    .vs-text { font-size: 12px; margin-top: 6px; }
    
    .results-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    .result-card-v2 { padding: 15px 10px; border-radius: 12px; }
    .result-card-v2 h4 { margin: 0 0 4px 0; font-size: 12px; }
    .result-card-v2 h2 { margin: 0 0 4px 0; font-size: 18px; }
    .result-card-v2 h3 { margin: 0 0 10px 0; font-size: 14px; }
    .result-card-v2 .pk-score { padding: 4px 10px; font-size: 12px; }
  }

  @media (max-width: 360px) {
    .results-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

  <div class="header">
    <div class="glass tab-container">
      <div id="tab-schedule" class="tab active" onclick="switchTab('schedule')">Расписание Лиги</div>
      <div id="tab-results" class="tab" onclick="switchTab('results')">Результаты Лиги</div>
    </div>
  </div>

  <div class="main-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="content">
      <div class="search-box glass">
        <input type="text" id="searchInput" placeholder="Поиск (введите текст)..." onkeyup="handleSearch()">
      </div>
      <div id="data-container">
        <div class="loading">Загрузка данных...</div>
      </div>
    </div>
  </div>

<script>
const sheetID = "1ine1ZqJrbK9kok_s7QujVLXhzj5hJuoKcguw8bQT2Jo";
let currentTab = "schedule"; 
let selectedDate = null;

const cache = {
  schedule: { dates: [], byDate: {}, loaded: false },
  results:  { dates: [], byDate: {}, loaded: false }
};

function getVal(row, index) {
  if (!row || !row.c || !row.c[index]) return "";
  if (row.c[index].f) return String(row.c[index].f).trim();
  return String(row.c[index].v || "").trim();
}

function getNum(row, index) {
  if (!row || !row.c || !row.c[index]) return 0;
  const val = row.c[index].v;
  return typeof val === 'number' ? val : (Number(val) || 0);
}

function parseDate(val) {
  if (typeof val === "string" && val.startsWith("Date(")) {
    const match = val.match(/Date\((\d+),(\d+),(\d+)/);
    if (match) {
      const y = match[1];
      const m = String(Number(match[2]) + 1).padStart(2, "0");
      const d = String(match[3]).padStart(2, "0");
      return `${d}.${m}.${y}`;
    }
  }
  return val;
}

function formatTime(val) {
  if (Array.isArray(val)) return `${String(val[0]).padStart(2,"0")}:${String(val[1]).padStart(2,"0")}`;
  return val;
}

function parseToDateObj(str) {
  let parts = str.split('.');
  if (parts.length === 3) return new Date(parts[2], parts[1]-1, parts[0]);
  return new Date(0); 
}

function switchTab(tabName) {
  if (currentTab === tabName && cache[tabName].loaded) return;
  currentTab = tabName;
  
  document.getElementById("searchInput").value = "";

  document.getElementById("tab-schedule").classList.remove("active");
  document.getElementById("tab-results").classList.remove("active");
  document.getElementById(`tab-${tabName}`).classList.add("active");

  document.getElementById("sidebar").innerHTML = "";
  document.getElementById("data-container").innerHTML = `<div class="loading">Загрузка данных...</div>`;

  if (cache[tabName].loaded) buildSidebar();
  else fetchData(tabName);
}

async function fetchData(tabName) {
  const sheetName = tabName === "schedule" ? "Расписание" : "Результаты 2.0";
  const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tq=SELECT%20*&sheet=${encodeURIComponent(sheetName)}`;

  try {
    const res = await fetch(url + "&_=" + Date.now());
    const text = await res.text();
    const json = JSON.parse(text.substr(47).slice(0, -2));
    const rows = json.table.rows || [];

    if (tabName === "schedule") parseSchedule(rows);
    else parseResults(rows);

    cache[tabName].dates.sort((a, b) => parseToDateObj(b) - parseToDateObj(a));
    cache[tabName].loaded = true;
    buildSidebar();
  } catch (e) {
    document.getElementById("data-container").innerHTML = `<div class="loading" style="color:#f43f5e;">Ошибка загрузки</div>`;
  }
}

function parseSchedule(rows) {
  cache.schedule.dates = [];
  cache.schedule.byDate = {};

  rows.forEach(r => {
    let date = parseDate(getVal(r, 0));
    if (!date || date.toLowerCase() === "дата") return;

    let time = formatTime(getVal(r, 1)) || "--:--";
    let colD = getVal(r, 3);
    let colE = getVal(r, 4);
    let colF = getVal(r, 5);
    
    let c2_name = getVal(r, 8) || "Без клана"; 
    let c2_id = getVal(r, 9) || "0000";      
    let p2 = getVal(r, 10) || "Неизвестно";    

    let searchStr = `${colD} ${colE} ${colF} ${p2} ${c2_id} ${c2_name}`.toLowerCase();

    if (!cache.schedule.byDate[date]) {
      cache.schedule.byDate[date] = [];
      cache.schedule.dates.push(date);
    }
    
    cache.schedule.byDate[date].push({ 
      time, p1: colD || "Неизвестно", c1_id: colE || "0000", c1_name: colF || "Без клана", 
      p2, c2_id, c2_name, searchStr 
    });
  });

  for (let d in cache.schedule.byDate) {
    cache.schedule.byDate[d].sort((a, b) => a.time.localeCompare(b.time));
  }
}

function parseResults(rows) {
  cache.results.dates = [];
  cache.results.byDate = {};

  rows.forEach(r => {
    let date = parseDate(getVal(r, 0));
    if (!date || date.toLowerCase() === "дата") return;

    let colC = getVal(r, 2);
    let colE = getVal(r, 4) || "—";
    let colF = getVal(r, 5) || "—";
    let colG = getVal(r, 6) || "—";
    let scoreNum = getNum(r, 7);
    let scoreStr = getVal(r, 7) || "0";

    let searchStr = `${colC} ${colE} ${colF} ${colG}`.toLowerCase();

    if (!cache.results.byDate[date]) {
      cache.results.byDate[date] = [];
      cache.results.dates.push(date);
    }
    
    cache.results.byDate[date].push({ 
      colC, colE, colF, colG, scoreNum, scoreStr, searchStr 
    });
  });

  for (let d in cache.results.byDate) {
    cache.results.byDate[d].sort((a, b) => b.scoreNum - a.scoreNum);
  }
}

function buildSidebar() {
  const dataRef = cache[currentTab];
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";

  if (dataRef.dates.length === 0) {
    document.getElementById("data-container").innerHTML = `<div class="loading">Нет данных</div>`;
    return;
  }

  dataRef.dates.forEach((date, index) => {
    const btn = document.createElement("div");
    btn.className = "date-btn glass";
    btn.innerText = date;
    btn.onclick = () => selectDate(date);
    sidebar.appendChild(btn);
    
    if (index === 0) selectDate(date);
  });
}

function selectDate(date) {
  selectedDate = date;
  document.getElementById("searchInput").value = ""; 
  renderContent();
}

function handleSearch() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  renderContent(q);
}

function renderContent(searchQuery = "") {
  const container = document.getElementById("data-container");
  const dataRef = cache[currentTab];
  let html = "";

  if (searchQuery !== "") {
    const searchTerms = searchQuery.split(" ").filter(t => t !== "");
    let matches = [];

    dataRef.dates.forEach(d => {
      dataRef.byDate[d].forEach(item => {
        const isMatch = searchTerms.every(term => item.searchStr.includes(term));
        if (isMatch) {
          matches.push({ ...item, dateLabel: d });
        }
      });
    });

    if (matches.length === 0) {
      container.innerHTML = `<div class="loading">Ничего не найдено</div>`;
      return;
    }

    document.querySelectorAll(".date-btn").forEach(btn => btn.classList.remove("active"));
    html = renderItems(matches, true);

  } else {
    const data = dataRef.byDate[selectedDate] || [];
    if (data.length === 0) {
      container.innerHTML = `<div class="loading">Нет данных</div>`;
      return;
    }

    document.querySelectorAll(".date-btn").forEach(btn => {
      btn.classList.toggle("active", btn.innerText === selectedDate);
    });
    
    html = renderItems(data, false);
  }

  container.innerHTML = html;
}

function renderItems(items, showDate = false) {
  let html = "";

  if (currentTab === "schedule") {
    html += `<div class="schedule-list">`;
    items.forEach(m => {
      let dateBadge = showDate ? `<div class="date-badge">${m.dateLabel}</div>` : "";
      
      html += `
        <div class="match-row glass">
          ${dateBadge}
          <div class="team-block left">
            <span class="player-name">${m.p1}</span>
            <span class="clan-name">${m.c1_name}</span>
            <span class="clan-id">ID Семьи: ${m.c1_id}</span>
          </div>
          <div class="match-center">
            <div class="time-badge">${m.time}</div>
            <div class="vs-text">VS</div>
          </div>
          <div class="team-block right">
            <span class="player-name">${m.p2}</span>
            <span class="clan-name">${m.c2_name}</span>
            <span class="clan-id">ID Семьи: ${m.c2_id}</span>
          </div>
        </div>`;
    });
    html += `</div>`;
  } 
  
  else {
    html += `<div class="results-grid">`;
    items.forEach(m => {
      let dateBadge = showDate ? `<div class="date-badge">${m.dateLabel}</div>` : "";
      html += `
        <div class="result-card-v2 glass">
          ${dateBadge}
          <h4>${m.colE}</h4>
          <h2>${m.colF}</h2>
          <h3>${m.colG}</h3>
          <h3 class="pk-score">ПК очки: ${m.scoreStr}</h3>
        </div>`;
    });
    html += `</div>`;
  }

  return html;
}

switchTab("schedule");
</script>
</body>
</html>
