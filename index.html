<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BIGO Event Page - Kurban Bayram</title>

<!-- Подключаем шрифт Exo 2 -->
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-page: #fefffd; 
    --block-bg: #ffffff;
    --kurban-green: #0d5c46; 
    --kurban-green-dark: #073b2d;
    --kurban-gold: #d4af37; 
    --kurban-gold-light: #fdfaf0;
    --text-main: #1a2622;
    --text-muted: #4f635c;
    --border-color: #e5edea;
    --shadow-soft: 0 12px 30px rgba(13, 92, 70, 0.06);
  }

  body {
    background-color: var(--bg-page);
    color: var(--text-main);
    font-family: 'Exo 2', sans-serif;
    margin: 0;
    padding: 0;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    top: -150px; left: 50%;
    transform: translateX(-50%);
    width: 100vw; max-width: 600px; height: 500px;
    background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, rgba(13, 92, 70, 0.05) 40%, transparent 70%);
    z-index: -1;
  }

  .container {
    max-width: 550px; 
    margin: 0 auto;
    padding: 15px 15px 50px;
  }

  /* ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКОВ */
  .lang-switcher {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 30px;
    position: sticky;
    top: 15px;
    z-index: 100;
  }
  .lang-switcher::before {
    content: '';
    position: absolute; right: 0; top: 0;
    background: var(--block-bg);
    border-radius: 30px;
    width: 120px; height: 100%;
    z-index: -1;
    border: 1px solid var(--kurban-gold);
    box-shadow: 0 4px 10px rgba(212, 175, 55, 0.15);
  }
  .lang-btn {
    background: transparent;
    border: none;
    color: var(--kurban-green);
    padding: 8px 18px;
    border-radius: 20px;
    font-weight: 800;
    font-size: 13px;
    cursor: pointer;
    transition: 0.3s;
  }
  .lang-btn.active { 
    background: var(--kurban-green); 
    color: #fff; 
  }

  /* РАМКИ БЛОКОВ */
  .content-block {
    background: var(--block-bg);
    border-radius: 16px;
    padding: 25px 20px 25px; /* Уменьшен верхний отступ для компактности */
    margin-top: 40px; 
    margin-bottom: 25px;
    box-shadow: var(--shadow-soft);
    border: 1px solid var(--kurban-gold);
    position: relative;
    animation: fadeUp 0.6s ease-out backwards;
  }
  
  .content-block:nth-child(1) { animation-delay: 0.1s; margin-top: 10px; padding-top: 25px;} 
  .content-block:nth-child(2) { animation-delay: 0.2s; }
  .content-block:nth-child(3) { animation-delay: 0.3s; }
  .content-block:nth-child(4) { animation-delay: 0.4s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ЦЕНТРИРОВАНИЕ ВСЕХ ТЕКСТОВ */
  .block-Title, .block-Subtitle, .block-Text, 
  .block-H1, .block-H2, .block-H3 {
    text-align: center;
  }

  /* ТИПОГРАФИКА */
  .block-Title { 
    font-size: 32px; 
    font-weight: 800; 
    margin: 0 0 5px; 
    color: var(--kurban-green-dark);
    line-height: 1.2;
  }
  .block-Subtitle { 
    font-size: 15px; 
    font-weight: 700; 
    margin-bottom: 25px; 
    color: var(--kurban-gold); 
    text-transform: uppercase; 
    letter-spacing: 2px;
  }
  
  /* =========================================
     H1 СКРУГЛЕННАЯ РАМКА (ВРЕЗАН В БЛОК)
     ========================================= */
  .h1-wrapper { 
    position: absolute;
    top: 0;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    text-align: center;
    z-index: 10;
  }
  .block-H1 { 
    font-size: 16px; 
    font-weight: 800; 
    color: var(--kurban-green-dark); 
    background: var(--block-bg); /* Фон перекрывает линию рамки блока */
    padding: 8px 24px; /* Отступы внутри рамки */
    display: inline-block;
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
    border: 2px solid var(--kurban-gold); /* Золотая рамка */
    border-radius: 50px; /* Сильное скругление */
    box-shadow: 0 4px 12px rgba(212, 175, 55, 0.1); /* Легкая тень от таблички */
  }
  .block-H1::before { content: '✦ '; color: var(--kurban-gold); font-weight: 400;}
  .block-H1::after { content: ' ✦'; color: var(--kurban-gold); font-weight: 400;}
  
  /* Убираем отступ у первого элемента под H1 */
  .h1-wrapper + div {
    margin-top: 0 !important;
  }

  /* H2 С ЛИНИЕЙ - делаем компактнее */
  .block-H2 { 
    font-size: 20px; 
    font-weight: 800; 
    margin: 20px 0 5px; /* Сильно уменьшили отступ снизу */
    color: var(--kurban-green);
    display: block; 
    position: relative;
  }
  .block-H2::after { 
    content: ''; display: block; width: 50px; height: 3px; 
    background: var(--kurban-gold); border-radius: 2px; margin: 6px auto 0;
  }
  
  /* H3 - прижимаем к тексту */
  .block-H3 { font-size: 16px; font-weight: 700; margin: 5px 0 5px; color: var(--kurban-gold);}
  
  /* TEXT - уплотняем абзацы */
  .block-Text { font-size: 15px; margin-bottom: 5px; color: var(--text-muted); line-height: 1.4;}
  
  /* ИНСТРУКЦИЯ */
  .block-Instruction {
    background: var(--kurban-gold-light);
    border: 1px solid rgba(212, 175, 55, 0.4);
    padding: 16px 20px;
    margin: 20px 0;
    border-radius: 12px;
    font-weight: 600;
    color: var(--kurban-green-dark);
    font-size: 14px;
    text-align: center;
  }

  /* ИЗОБРАЖЕНИЕ */
  .block-Image { text-align: center; margin: 20px 0; }
  .block-Image img { max-width: 100%; border-radius: 12px; box-shadow: 0 8px 20px rgba(13, 92, 70, 0.1); border: 1px solid var(--border-color);}

  /* СЕТКА КАРТОЧЕК */
  .grid-TableCard {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px; 
    margin: 20px 0;
  }
  .card-item {
    background: #fff;
    border: 1px solid var(--border-color);
    border-radius: 10px;
    padding: 6px 4px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  }
  .card-item img {
    width: 85%; aspect-ratio: 1/1; object-fit: contain; margin-bottom: 6px;
    background: var(--kurban-gold-light); border-radius: 6px; padding: 2px;
  }
  .card-item span { 
    font-weight: 700; font-size: 9px;
    display: block; line-height: 1.2; color: var(--text-main); word-break: break-word;
  }

  /* КНОПКИ (2 В РЯД, ПРОЗРАЧНЫЕ) */
  .grid-Button {
    display: grid;
    grid-template-columns: repeat(2, 1fr); 
    gap: 12px;
    margin: 25px 0 10px;
  }
  .btn-item {
    background: transparent; 
    color: var(--kurban-green); 
    text-align: center; 
    padding: 14px 10px; 
    border-radius: 50px;
    text-decoration: none; 
    font-weight: 800; 
    font-size: 14px;
    text-transform: uppercase; 
    border: 2px solid var(--kurban-green); 
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-item:hover { 
    background: var(--kurban-green); 
    color: #fff; 
    transform: translateY(-2px); 
    box-shadow: 0 6px 15px rgba(13, 92, 70, 0.2);
  }

  /* ТАБЛИЦА НАГРАД */
  .reward-table-container { 
    margin: 20px 0; overflow-x: auto; border-radius: 12px; 
    border: 1px solid var(--kurban-gold);
    box-shadow: var(--shadow-soft);
  }
  .reward-table {
    width: 100%; border-collapse: collapse; background: #fff; min-width: 320px;
  }
  .reward-table th {
    background: var(--kurban-green); color: #fff; font-weight: 800;
    padding: 14px 10px; border-bottom: 2px solid var(--kurban-gold);
    text-align: center; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
  }
  .reward-table td {
    padding: 12px 10px; border-bottom: 1px solid var(--border-color);
    text-align: center; font-weight: 700; vertical-align: middle; font-size: 13px; color: var(--kurban-green-dark);
  }
  .reward-table tr:last-child td { border-bottom: none; }
  .reward-table tr:nth-child(even) { background: var(--kurban-gold-light); }
  
  .reward-icon { width: 40px; height: 40px; object-fit: contain; display: block; margin: 0 auto;}

  .loading { text-align: center; padding: 50px; font-size: 16px; font-weight: 700; color: var(--kurban-green); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0% {opacity: 0.5;} 50% {opacity: 1;} 100% {opacity: 0.5;} }

</style>
</head>
<body>

  <div class="container">
    <div class="lang-switcher">
      <button class="lang-btn active" id="btn-ru" onclick="switchLang('ru')">RU</button>
      <button class="lang-btn" id="btn-uz" onclick="switchLang('uz')">UZ</button>
    </div>

    <div id="content">
      <div class="loading">Загрузка данных... ⏳</div>
    </div>
  </div>

<script>
const sheetID = "1YZh92BcRe-ctZjJNxnRCNgSCgw3i4UEuu6STb_06PUo";
const sheetGID = "0"; 

let currentLang = 'ru'; 
let pageBlocks = []; 

async function fetchData() {
  const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tq=SELECT%20A,B,C,D&gid=${sheetGID}&_=${Date.now()}`;
  
  try {
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substr(47).slice(0, -2));
    const rows = json.table.rows || [];

    let currentBlockId = null;
    let currentGroup = [];

    rows.forEach(r => {
      let block = r.c[0] ? String(r.c[0].v).trim() : "";
      let style = r.c[1] ? String(r.c[1].v).trim() : "";
      let ru = r.c[2] ? String(r.c[2].v).trim() : "";
      let uz = r.c[3] ? String(r.c[3].v).trim() : "";

      if (style.toLowerCase() === 'style' || style === "") return;

      let rowData = { style, ru, uz };

      if (block !== currentBlockId) {
        if (currentGroup.length > 0) pageBlocks.push(currentGroup);
        currentBlockId = block;
        currentGroup = [];
      }
      currentGroup.push(rowData);
    });
    
    if (currentGroup.length > 0) pageBlocks.push(currentGroup);

    renderPage();
  } catch (e) {
    document.getElementById("content").innerHTML = `<div class="loading">❌ Ошибка загрузки данных</div>`;
    console.error(e);
  }
}

function switchLang(lang) {
  currentLang = lang;
  document.getElementById("btn-ru").classList.toggle("active", lang === 'ru');
  document.getElementById("btn-uz").classList.toggle("active", lang === 'uz');
  renderPage();
}

function renderPage() {
  const container = document.getElementById("content");
  let html = "";

  pageBlocks.forEach(group => {
    html += `<div class="content-block">`; 

    let inTableCardGrid = false;
    let inButtonGrid = false;
    let inRewardTable = false;

    function closeGroups(currentStyle) {
      if (inTableCardGrid && currentStyle !== 'TableCard') { html += `</div>`; inTableCardGrid = false; }
      if (inButtonGrid && currentStyle !== 'Button') { html += `</div>`; inButtonGrid = false; }
      if (inRewardTable && currentStyle !== 'RewardTable') { html += `</tbody></table></div>`; inRewardTable = false; }
    }

    group.forEach(row => {
      let content = currentLang === 'ru' ? row.ru : row.uz;
      if (!content) content = row.ru; 
      if (!content) return; 

      const style = row.style;
      closeGroups(style);

      switch(style) {
        case 'H1':
          html += `<div class="h1-wrapper"><div class="block-H1">${content.replace(/\n/g, '<br>')}</div></div>`;
          break;
        case 'Title':
        case 'Subtitle':
        case 'H2':
        case 'H3':
        case 'Text':
          html += `<div class="block-${style}">${content.replace(/\n/g, '<br>')}</div>`;
          break;

        case 'Instruction':
          html += `<div class="block-Instruction">${content.replace(/\n/g, '<br>')}</div>`;
          break;

        case 'Image':
          html += `<div class="block-Image"><img src="${content}" alt="Image"></div>`;
          break;

        case 'TableCard':
          if (!inTableCardGrid) {
            html += `<div class="grid-TableCard">`;
            inTableCardGrid = true;
          }
          let cards = content.split(',');
          cards.forEach(cardStr => {
            if(!cardStr.trim()) return;
            let parts = cardStr.split('<br>');
            let cardName = parts[0] ? parts[0].trim() : '';
            let imgLink = parts[1] ? parts[1].trim() : '';
            html += `
              <div class="card-item">
                ${imgLink ? `<img src="${imgLink}" alt="item">` : ''}
                <span>${cardName}</span>
              </div>`;
          });
          break;

        case 'Button':
          if (!inButtonGrid) {
            html += `<div class="grid-Button">`;
            inButtonGrid = true;
          }
          let btnParts = content.split(',');
          let btnName = btnParts[0] ? btnParts[0].trim() : 'Кнопка';
          let btnLink = btnParts[1] ? btnParts[1].trim() : '#';
          html += `<a href="${btnLink}" target="_blank" class="btn-item">${btnName}</a>`;
          break;

        case 'RewardTable':
          let isHeader = false;
          if (!inRewardTable) {
            html += `<div class="reward-table-container"><table class="reward-table"><tbody>`;
            inRewardTable = true;
            isHeader = true; 
          }
          
          let cols = content.split(',');
          html += `<tr>`;
          cols.forEach(col => {
            let val = col.trim();
            let tag = isHeader ? 'th' : 'td';
            if (val.startsWith('http')) {
              html += `<${tag}><img src="${val}" class="reward-icon" alt="reward"></${tag}>`;
            } else {
              html += `<${tag}>${val}</${tag}>`;
            }
          });
          html += `</tr>`;
          break;

        default:
          html += `<div class="block-Text">${content}</div>`;
          break;
      }
    });

    closeGroups(''); 
    html += `</div>`; 
  });

  container.innerHTML = html;
}

fetchData();
</script>
</body>
</html>
