<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Семейная Лига BIGO</title>
    <style>
        /* Цветовая палитра в стиле скриншота */
        :root {
            --bg-page: #0d1115;       
            --bg-card: #181d23;       
            --bg-table: #21262d;      
            
            --teal-dark: #123f45;     
            --teal-light: #186c72;    
            
            --orange: #f5a631;        
            --orange-bg: #f5a631;     
            
            --text-main: #ffffff;     
            --text-muted: #8b949e;    
            --border-line: #2d333b;   
        }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        
        body { 
            background-color: var(--bg-page); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px 10px; 
            line-height: 1.5; 
        }
        .container { max-width: 800px; margin: 0 auto; }
        
        /* Шапка и Языки */
        .header { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .lang-switcher { display: flex; background: #1f2937; border-radius: 20px; padding: 4px; }
        .lang-btn { background: transparent; border: none; color: var(--text-muted); padding: 5px 15px; border-radius: 16px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .lang-btn.active { background: var(--orange); color: #000; }

        /* =========================================
           ГЛАВНОЕ МЕНЮ (Всегда по центру)
           ========================================= */
        .main-menu { 
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap;
            gap: 15px; 
            margin-bottom: 25px; 
        }
        .main-btn { 
            background-color: var(--teal-dark); 
            color: var(--text-main); 
            border: none; 
            font-size: 20px; 
            font-weight: 800; 
            text-transform: uppercase;
            cursor: pointer; 
            padding: 16px 40px; 
            border-radius: 8px; 
            transition: 0.3s; 
            text-align: center; 
            position: relative;
            min-width: 200px; 
        }
        .main-btn.active { 
            background-color: var(--teal-light); 
            color: var(--orange); 
            border-bottom: 5px solid var(--orange);
            border-bottom-left-radius: 4px;
            border-bottom-right-radius: 4px;
        }

        /* Основная карточка */
        .content-area { 
            background-color: var(--bg-card); 
            border-radius: 16px; 
            padding: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            animation: fadeIn 0.4s ease; 
        }

        /* =========================================
           ПОДМЕНЮ (Всегда по центру)
           ========================================= */
        .tabs-wrapper {
            display: flex;
            justify-content: center; 
            width: 100%;
            margin-bottom: 15px;
        }
        #tabs-container {
            display: inline-flex;
            background-color: var(--teal-light);
            border-radius: 8px;
            overflow: hidden;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: var(--orange);
            font-size: 18px;
            font-weight: bold;
            padding: 14px 45px; 
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .tab-btn.active {
            background-color: var(--orange-bg);
            color: #ffffff;
        }

        #subtabs-container { display: flex; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center; }
        .subtab-btn { background: transparent; border: 1px solid var(--border-line); color: var(--text-muted); padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; text-align: center; }
        .subtab-btn.active { border-color: var(--orange); color: var(--orange); }

        /* =========================================
           ЗАГОЛОВКИ И ТЕКСТ (По умолчанию - слева)
           ========================================= */
        .cal-title { color: var(--orange); font-size: 22px; margin: 20px 0 15px 0; font-weight: bold; text-align: left; }
        .rule-text, .cal-text { color: #d1d5db; font-size: 16px; margin-bottom: 15px; text-align: left; }
        .main-title { font-size: 24px; color: var(--orange); margin-bottom: 20px; text-align: left; }
        
        /* Вспомогательный класс для центрирования элементов Календаря */
        .text-center { text-align: center !important; }

        /* =========================================
           ТАБЛИЦЫ (Данные всегда по центру)
           ========================================= */
        .data-table-wrapper { 
            background-color: var(--bg-table); 
            border-radius: 12px; 
            overflow-x: auto; 
            margin-bottom: 25px;
            padding: 5px 15px;
        }
        .data-table { width: 100%; border-collapse: collapse; font-size: 16px; }
        .data-table th, .data-table td { 
            padding: 14px 10px; 
            border-bottom: 1px solid var(--border-line); 
            white-space: nowrap; 
            text-align: center; /* Центрируем весь текст в таблицах (С2-Е9 и т.д.) */
            vertical-align: middle;
        }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table th { color: var(--text-main); font-size: 13px; font-weight: bold; }
        .data-table td:nth-child(3) { color: var(--orange); font-weight: bold; }
        .data-table td:nth-child(1), .data-table td:nth-child(2) { color: var(--text-main); }
        
        .cell-img { max-width: 40px; max-height: 40px; vertical-align: middle; margin: 0 auto; display: block;}
        
        .action-button { display: inline-block; text-align: center; background: var(--teal-light); color: white; padding: 12px 30px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 10px; }
        
        #loader { text-align: center; color: var(--orange); padding: 50px; font-size: 18px; font-weight: bold;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* =========================================
           МОБИЛЬНАЯ АДАПТАЦИЯ (Телефоны)
           ========================================= */
        @media (max-width: 600px) {
            body { padding: 15px 10px; }
            .content-area { padding: 20px 15px; border-radius: 12px; }
            
            .main-menu { gap: 6px; flex-wrap: nowrap; }
            .main-btn { font-size: 13px; padding: 12px 5px; border-bottom-width: 4px; min-width: unset; flex: 1; }
            
            .tabs-wrapper { display: flex; }
            #tabs-container { display: flex; width: 100%; }
            .tab-btn { font-size: 14px; padding: 10px 5px; flex: 1; }
            
            .cal-title { font-size: 18px; }
            .rule-text, .cal-text { font-size: 14px; }
            
            .data-table { font-size: 13px; }
            .data-table th { font-size: 11px; padding: 10px 5px;}
            .data-table td { padding: 12px 5px; }
            .data-table-wrapper { padding: 0 10px; border-radius: 8px;}
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="setLang('RU')">RU</button>
            <button class="lang-btn" onclick="setLang('UZ')">UZ</button>
        </div>
    </div>

    <div class="main-menu" id="main-menu" style="display: none;">
        <button class="main-btn active" onclick="switchMainTab('Rewards')">Награды</button>
        <button class="main-btn" onclick="switchMainTab('Calendar')">Календарь</button>
        <button class="main-btn" onclick="switchMainTab('Rules')">Правила</button>
    </div>
    
    <div id="loader">Загрузка данных... ⏳</div>

    <div class="content-area" id="content-container" style="display: none;">
        <div id="rewards-nav" style="display: none;">
            <div class="tabs-wrapper">
                <div id="tabs-container"></div>
            </div>
            <div id="subtabs-container"></div>
        </div>
        <div id="dynamic-content"></div>
    </div>
</div>

<script>
    const sheetId = '1P_2Vko2-RA4VXFCqzMYE20hp5MjJsQ4zh_bU0ohYbII';
    const GIDS = { 'Rewards': '1090262398', 'Calendar': '691237427', 'Rules': '0' };

    let allData = { 'Rewards': [], 'Calendar': [], 'Rules': [] };
    let parsedRewards = { 'RU': {}, 'UZ': {} }; 
    
    let currentLang = 'RU';
    let currentMainTab = 'Rewards';
    let currentActiveTab = '';    
    let currentActiveSubtab = ''; 

    const getCol = (row, index) => (row && row[index]) ? row[index].trim() : '';

    async function fetchAllData() {
        try {
            const promises = Object.keys(GIDS).map(async (tabName) => {
                const url = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${GIDS[tabName]}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error();
                const text = await res.text();
                allData[tabName] = parseCSV(text);
            });

            await Promise.all(promises);
            prepareRewardsData(); 
            initUI();
        } catch (error) {
            document.getElementById('loader').innerText = '❌ Ошибка загрузки. Обновите страницу.';
        }
    }

    function parseCSV(csv) {
        const rows = [];
        let row = [], col = "", inQ = false;
        for (let i = 0; i < csv.length; i++) {
            let c = csv[i], nc = csv[i+1];
            if (c === '"' && inQ && nc === '"') { col += '"'; i++; }
            else if (c === '"') inQ = !inQ;
            else if (c === ',' && !inQ) { row.push(col.trim()); col = ""; }
            else if ((c === '\n' || c === '\r') && !inQ) {
                if (c === '\r' && nc === '\n') i++;
                row.push(col.trim()); rows.push(row); row = []; col = "";
            } else col += c;
        }
        if (col || row.length) { row.push(col.trim()); rows.push(row); }
        return rows;
    }

    function prepareRewardsData() {
        const rows = allData['Rewards'];
        let lastRuTab = '', lastRuSub = '';
        let lastUzTab = '', lastUzSub = '';

        for (let i = 1; i < rows.length; i++) { 
            const r = rows[i];
            
            let rTab = getCol(r, 0); if (rTab) lastRuTab = rTab;
            let rSub = getCol(r, 1); if (rSub) lastRuSub = rSub;
            let rC1 = getCol(r, 2), rC2 = getCol(r, 3), rC3 = getCol(r, 4);
            
            if (lastRuTab && lastRuSub && (rC1 || rC2 || rC3)) {
                if (!parsedRewards['RU'][lastRuTab]) parsedRewards['RU'][lastRuTab] = {};
                if (!parsedRewards['RU'][lastRuTab][lastRuSub]) parsedRewards['RU'][lastRuTab][lastRuSub] = [];
                parsedRewards['RU'][lastRuTab][lastRuSub].push({ c1: rC1, c2: rC2, c3: rC3 });
            }

            let uTab = getCol(r, 5); if (uTab) lastUzTab = uTab;
            let uSub = getCol(r, 6); if (uSub) lastUzSub = uSub;
            let uC1 = getCol(r, 7), uC2 = getCol(r, 8), uC3 = getCol(r, 9);
            
            if (lastUzTab && lastUzSub && (uC1 || uC2 || uC3)) {
                if (!parsedRewards['UZ'][lastUzTab]) parsedRewards['UZ'][lastUzTab] = {};
                if (!parsedRewards['UZ'][lastUzTab][lastUzSub]) parsedRewards['UZ'][lastUzTab][lastUzSub] = [];
                parsedRewards['UZ'][lastUzTab][lastUzSub].push({ c1: uC1, c2: uC2, c3: uC3 });
            }
        }
    }

    function initUI() {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('main-menu').style.display = 'flex';
        switchMainTab('Rewards');
    }

    function setLang(lang) {
        const oldLang = currentLang;
        currentLang = lang;
        
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        const mainBtns = document.querySelectorAll('.main-btn');
        mainBtns[0].innerText = lang === 'RU' ? 'НАГРАДЫ' : 'MUKOFOTLAR';
        mainBtns[1].innerText = lang === 'RU' ? 'КАЛЕНДАРЬ' : 'TAQVIM';
        mainBtns[2].innerText = lang === 'RU' ? 'ПРАВИЛА' : 'QOIDALAR';

        if (currentMainTab === 'Rewards') {
            const oldTabs = Object.keys(parsedRewards[oldLang] || {});
            const newTabs = Object.keys(parsedRewards[lang] || {});
            const tabIdx = oldTabs.indexOf(currentActiveTab);
            
            currentActiveTab = (tabIdx !== -1 && newTabs[tabIdx]) ? newTabs[tabIdx] : newTabs[0];

            if (currentActiveTab) {
                const oldSubtabs = Object.keys(parsedRewards[oldLang][oldTabs[tabIdx]] || {});
                const newSubtabs = Object.keys(parsedRewards[lang][currentActiveTab] || {});
                const subIdx = oldSubtabs.indexOf(currentActiveSubtab);
                currentActiveSubtab = (subIdx !== -1 && newSubtabs[subIdx]) ? newSubtabs[subIdx] : newSubtabs[0];
            }
            renderRewardsNav();
        } else {
            renderCurrentView();
        }
    }

    function switchMainTab(tab) {
        currentMainTab = tab;
        document.querySelectorAll('.main-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('content-container').style.display = 'block';
        document.getElementById('rewards-nav').style.display = (tab === 'Rewards') ? 'block' : 'none';
        
        if (tab === 'Rewards') {
            const tabs = Object.keys(parsedRewards[currentLang] || {});
            if (!currentActiveTab || !tabs.includes(currentActiveTab)) currentActiveTab = tabs[0];
            renderRewardsNav();
        } else {
            renderCurrentView();
        }
    }

    function renderCurrentView() {
        if (currentMainTab === 'Rewards') renderRewardsContent();
        else if (currentMainTab === 'Calendar') renderCalendarContent();
        else if (currentMainTab === 'Rules') renderRulesContent();
    }

    function renderRewardsNav() {
        const tabsContainer = document.getElementById('tabs-container');
        const subtabsContainer = document.getElementById('subtabs-container');
        tabsContainer.innerHTML = ''; subtabsContainer.innerHTML = '';

        const tabs = Object.keys(parsedRewards[currentLang] || {});
        tabs.forEach(tab => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (tab === currentActiveTab ? ' active' : '');
            btn.innerText = tab;
            btn.onclick = () => { currentActiveTab = tab; currentActiveSubtab = Object.keys(parsedRewards[currentLang][tab])[0]; renderRewardsNav(); };
            tabsContainer.appendChild(btn);
        });

        if (currentActiveTab && parsedRewards[currentLang][currentActiveTab]) {
            const subtabs = Object.keys(parsedRewards[currentLang][currentActiveTab]);
            if (!currentActiveSubtab || !subtabs.includes(currentActiveSubtab)) currentActiveSubtab = subtabs[0];
            
            if (!(subtabs.length === 1 && subtabs[0] === "")) {
                subtabs.forEach(sub => {
                    const btn = document.createElement('button');
                    btn.className = 'subtab-btn' + (sub === currentActiveSubtab ? ' active' : '');
                    btn.innerText = sub;
                    btn.onclick = () => { currentActiveSubtab = sub; renderRewardsNav(); };
                    subtabsContainer.appendChild(btn);
                });
            }
        }
        renderCurrentView();
    }

    function renderRewardsContent() {
        const tabData = parsedRewards[currentLang][currentActiveTab] || {};
        const rows = tabData[currentActiveSubtab] || [];
        
        let html = '';
        let inFullTable = false, inMiniTable = false;

        const fmt = (text) => {
            if (!text) return '';
            if (text.startsWith('http')) return `<img src="${text}" class="cell-img" alt="img">`;
            return text.replace(/\n/g, '<br>');
        };

        rows.forEach((row) => {
            let { c1, c2, c3 } = row;

            if (c1 && c2 && c3) {
                if (inMiniTable) { html += '</table></div>'; inMiniTable = false; }
                if (!inFullTable) { 
                    html += `<div class="data-table-wrapper"><table class="data-table">`; 
                    inFullTable = true;
                    html += `<tr><th>${fmt(c1)}</th><th>${fmt(c2)}</th><th>${fmt(c3)}</th></tr>`;
                } else {
                    html += `<tr><td>${fmt(c1)}</td><td>${fmt(c2)}</td><td>${fmt(c3)}</td></tr>`;
                }
            } else if (!c1 && c2 && c3) {
                if (inFullTable) { html += '</table></div>'; inFullTable = false; }
                if (!inMiniTable) { 
                    html += `<div class="data-table-wrapper"><table class="data-table" style="max-width:500px; margin: 0 auto;">`; 
                    inMiniTable = true; 
                }
                html += `<tr><td style="border-bottom:none;">${fmt(c2)}</td><td style="border-bottom:none;">${fmt(c3)}</td></tr>`;
            } else {
                if (inFullTable) { html += '</table></div>'; inFullTable = false; }
                if (inMiniTable) { html += '</table></div>'; inMiniTable = false; }
                
                // Текст вне таблиц выравнивается по левому краю (классы по умолчанию)
                if (c1) html += `<div class="cal-title">${c1}</div>`;
                if (c2) html += `<div class="rule-text">${fmt(c2)}</div>`;
            }
        });

        if (inFullTable || inMiniTable) html += `</table></div>`;
        document.getElementById('dynamic-content').innerHTML = html || `<div class="rule-text">Данные отсутствуют.</div>`;
    }

    function renderCalendarContent() {
        const rows = allData['Calendar'];
        let html = '';
        let hasData = false;
        
        rows.forEach((row, idx) => {
            if (idx === 0) return; 
            let title = currentLang === 'RU' ? getCol(row, 0) : getCol(row, 2);
            let value = currentLang === 'RU' ? getCol(row, 1) : getCol(row, 3);

            if (!title && !value) return;
            hasData = true;

            // Календарь выравнивается строго по центру (добавлен класс text-center)
            if (title) html += `<div class="cal-title text-center" style="font-size:18px;">${title}</div>`;
            
            if (value) {
                if (value.startsWith('http')) {
                    const btnText = currentLang === 'RU' ? 'Открыть ссылку' : 'Havolani ochish';
                    html += `<div class="text-center"><a href="${value}" target="_blank" class="action-button">${btnText}</a></div>`;
                } else {
                    html += `<div class="cal-text text-center">${value.replace(/\n/g, '<br>')}</div>`;
                }
            }
            html += `<hr style="border: 0; border-bottom: 1px solid var(--border-line); margin: 15px 0;">`;
        });
        
        document.getElementById('dynamic-content').innerHTML = hasData ? html : `<div class="rule-text text-center">Календарь пока пуст.</div>`;
    }

    function renderRulesContent() {
        const rows = allData['Rules'];
        let html = '';
        let hasData = false;
        
        rows.forEach((row, idx) => {
            if (idx === 0) return; 
            let title = currentLang === 'RU' ? getCol(row, 0) : getCol(row, 2); 
            let text = currentLang === 'RU' ? getCol(row, 1) : getCol(row, 3);

            if (!title && !text) return;
            hasData = true;

            // Правила по левому краю (классы по умолчанию)
            if (idx === 1) { 
                html += `<div class="main-title">${title}</div>`;
                if (text) html += `<div class="rule-text" style="margin-bottom:25px;">${text.replace(/\n/g, '<br>')}</div>`;
            } else {
                if (title) html += `<div class="cal-title" style="font-size:18px;">${title}</div>`;
                if (text) html += `<div class="rule-text">${text.replace(/\n/g, '<br>')}</div>`;
            }
        });
        
        document.getElementById('dynamic-content').innerHTML = hasData ? html : `<div class="rule-text">Правила формируются.</div>`;
    }

    fetchAllData();
</script>
</body>
</html>
