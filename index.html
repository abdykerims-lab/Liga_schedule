<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Семейный Май-Фест</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-page: #0d1115;
    --orange: #f5a631;        
    --border-line: rgba(245, 166, 49, 0.3);
    --text-main: #ffffff;
    --text-muted: #c9d1d9;
    --teal-light: rgba(24, 108, 114, 0.15);
    --glass-bg: rgba(24, 29, 35, 0.6);
  }

  body {
    margin: 0; padding: 0;
    background-image: linear-gradient(rgba(13, 17, 21, 0.85), rgba(13, 17, 21, 0.95)), url('https://i.ibb.co/xqnNLxj4/1vs1-1.jpg'); 
    background-size: cover; background-position: center; background-attachment: fixed;
    background-color: var(--bg-page); font-family: 'Exo 2', sans-serif;
    color: var(--text-main); min-height: 100vh; padding: 20px 15px 60px;
  }

  .container { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

  /* === ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКА === */
  .lang-switcher { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: -10px; }
  .lang-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(245, 166, 49, 0.5); color: #fff; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-weight: 800; font-family: 'Exo 2', sans-serif; font-size: 14px; transition: 0.3s; }
  .lang-btn.active { background: var(--orange); color: #0d1115; border-color: var(--orange); box-shadow: 0 0 10px rgba(245, 166, 49, 0.5); }

  /* === ДИЗАЙН БЛОКОВ === */
  .page-block { 
    background: var(--glass-bg); 
    backdrop-filter: blur(12px); 
    border: 1px solid rgba(255,255,255,0.05); 
    border-radius: 16px; 
    padding: 25px 20px; 
    box-shadow: 0 8px 30px rgba(0,0,0,0.3); 
    display: flex; flex-direction: column; gap: 15px; 
  }
  #block-1 { background: transparent; border: none; box-shadow: none; padding: 10px 0; }

  .loading { text-align: center; color: var(--orange); font-size: 20px; font-weight: 800; padding: 50px; }

  /* === ТЕКСТА И ЗАГОЛОВКИ === */
  .hero-header { text-align: center; position: relative; background: radial-gradient(circle at top center, var(--teal-light) 0%, transparent 70%); }
  .hero-title { margin: 0 0 12px 0; font-size: 42px; font-weight: 800; text-transform: uppercase; background: linear-gradient(135deg, #ffffff 0%, var(--orange) 70%, #ff7a00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.5)); line-height: 1.1; }
  .hero-subtitle { font-size: 16px; font-weight: 800; color: var(--orange); text-transform: uppercase; letter-spacing: 3px; background: rgba(24, 29, 35, 0.8); border-top: 1px solid var(--border-line); border-bottom: 1px solid rgba(245, 166, 49, 0.1); padding: 8px 24px; border-radius: 8px; display: inline-block; }

  .section-title { text-align: center; font-size: 26px; font-weight: 800; text-transform: uppercase; margin: 10px 0 0; display: flex; align-items: center; justify-content: center; gap: 15px; text-align: center;}
  .section-title::before, .section-title::after { content: ''; flex-grow: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--border-line), transparent); max-width: 100px; }
  .sub-title { font-size: 18px; color: var(--orange); font-weight: 800; text-transform: uppercase; margin: 5px 0 0; text-align: center; }
  .text-block { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 15px; text-align: center; font-size: 15px; font-weight: 600; line-height: 1.5; color: #e2e8f0; }

  /* === ОБНОВЛЕНО: КАРТОЧКИ (GROUPCARD - Строго 3 в ряд везде) === */
  .cards-wrapper { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
  .simple-card { background: rgba(255,255,255,0.03); border-left: 3px solid var(--orange); border-radius: 8px; padding: 12px 6px; text-align: center; font-weight: 800; color: var(--orange); font-size: 14px; display: flex; align-items: center; justify-content: center; }

  /* === ПОДАРКИ === */
  .gifts-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; } 
  .gifts-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; } 
  
  .gift-card { background: rgba(18, 63, 69, 0.4); border-radius: 12px; padding: 12px 5px; text-align: center; position: relative; border: 1px solid rgba(255,255,255,0.05); }
  .gift-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, var(--orange), #ff7a00); }
  .gift-img { height: 60px; object-fit: contain; margin-bottom: 8px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
  .gift-title { font-weight: 800; font-size: 13px; margin-bottom: 5px; line-height: 1.2; }
  .gift-stat { font-size: 11px; color: var(--text-muted); background: rgba(0,0,0,0.4); border-radius: 4px; padding: 3px 0; margin-bottom: 3px; font-weight: 600; }
  .gift-stat span { color: var(--orange); font-weight: 800; }

  /* === ТАБЛИЦА-ФОТО (TABLECARD - 5 в ряд) === */
  .photo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; }
  .photo-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 8px 4px; text-align: center; display: flex; flex-direction: column; align-items: center; }
  .photo-img { width: 100%; height: 40px; object-fit: contain; margin-bottom: 6px; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.5)); }
  .photo-title { font-weight: 800; font-size: 10px; color: #fff; line-height: 1.2; word-wrap: break-word; }

  /* === ВКЛАДКИ (TAB) === */
  .tabs-menu { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 5px 0; }
  .tab-btn { background: rgba(31, 41, 55, 0.8); border: 1px solid rgba(255,255,255,0.05); color: var(--text-muted); font-size: 14px; font-weight: 800; text-transform: uppercase; padding: 12px 5px; border-radius: 8px; cursor: pointer; transition: 0.3s; text-align: center; }
  .tab-btn.active { background: var(--teal-light); color: var(--orange); border-bottom: 3px solid var(--orange); }
  
  .tab-content { display: none; animation: fadeIn 0.4s ease; flex-direction: column; gap: 15px; }
  .tab-content.active { display: flex; }

  /* === ТАБЛИЦЫ === */
  .table-wrapper { width: 100%; overflow-x: auto; border-radius: 10px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); }
  .styled-table { width: 100%; border-collapse: collapse; text-align: center; min-width: 300px; }
  .styled-table th { background: rgba(245, 166, 49, 0.1); color: var(--orange); padding: 12px 5px; font-size: 11px; text-transform: uppercase; font-weight: 800; border-bottom: 1px solid var(--border-line); }
  .styled-table td { padding: 10px 5px; font-size: 13px; font-weight: 600; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.02); }
  .styled-table tr:hover { background: rgba(255,255,255,0.03); }
  .styled-table img { height: 35px; width: auto; object-fit: contain; vertical-align: middle; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  /* Адаптация под очень узкие экраны */
  @media (max-width: 450px) {
    .hero-title { font-size: 32px; }
    .section-title { font-size: 22px; }
    .tab-btn { font-size: 11px; padding: 10px 2px; }
    
    /* Делаем Groupcard меньше, чтобы 3 влезли в ряд */
    .cards-wrapper { gap: 6px; }
    .simple-card { font-size: 11px; padding: 8px 4px; border-left: 2px solid var(--orange); }

    .gifts-grid-3 .gift-title { font-size: 11px; }
    .gifts-grid-3 .gift-stat { font-size: 9px; }
    .gifts-grid-3 .gift-img { height: 45px; }
    .gifts-grid-2 .gift-img { height: 55px; }
    .photo-grid { gap: 4px; }
    .photo-card { padding: 6px 2px; }
    .photo-title { font-size: 8px; }
    .photo-img { height: 30px; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- Кнопки переключения языка -->
  <div class="lang-switcher" id="lang-switcher" style="display: none;">
    <button id="btn-ru" class="lang-btn active" onclick="switchLanguage('ru')">RU</button>
    <button id="btn-uz" class="lang-btn" onclick="switchLanguage('uz')">UZ</button>
  </div>

  <div id="landing-content">
    <div class="loading" id="loader">Загрузка Базы Данных... 🚀</div>
  </div>
</div>

<script>
const sheetID = "1ENDx5Flv0Gs-lMOx_oNn_CsgV8euE-lJpgDa5knyFHM";
const gid = "2053212498"; 

// Глобальные переменные для переключения языка
let globalRows = [];
let currentLang = 'ru'; 

async function loadLandingData() {
  const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tq=SELECT%20*&gid=${gid}&_=${Date.now()}`;
  try {
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substr(47).slice(0, -2));
    
    globalRows = json.table.rows; // Сохраняем в память
    document.getElementById("lang-switcher").style.display = "flex"; // Показываем кнопки языков
    renderLanding();
  } catch (error) {
    document.getElementById("loader").innerHTML = "❌ Ошибка загрузки данных.";
  }
}

// Функция смены языка по кнопке
window.switchLanguage = function(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('btn-' + lang).classList.add('active');
  renderLanding(); // Перерисовываем без запроса к интернету
};

function getVal(row, index) {
  if (!row || !row.c || !row.c[index]) return "";
  return String(row.c[index].v || "").trim();
}

function renderLanding() {
  let mainHtml = "";
  let currentBlock = null;

  // Управление Вкладками
  let inTabs = false;
  let tabsMenuHtml = "";
  let tabsContentHtml = "";
  let tabCount = 0;
  let currentTabParent = ""; 

  // Управление Группировкой
  let inTable = false;
  let inCards = false;
  let inGifts1 = false;
  let inGifts2 = false;

  function appendHtml(str) {
    if (inTabs) tabsContentHtml += str;
    else mainHtml += str;
  }

  function closeGroups(newType = "") {
    if (inTable && !newType.includes("table")) { appendHtml(`</tbody></table></div>`); inTable = false; }
    if (inCards && newType !== "groupcard") { appendHtml(`</div>`); inCards = false; }
    if (inGifts1 && newType !== "giftcard1") { appendHtml(`</div>`); inGifts1 = false; }
    if (inGifts2 && newType !== "giftcard2") { appendHtml(`</div>`); inGifts2 = false; }
  }

  function flushTabs() {
    if (inTabs) {
      closeGroups(""); 
      tabsContentHtml += `</div>`; 
      mainHtml += tabsMenuHtml + `</div><div class="tabs-content-wrapper">` + tabsContentHtml + `</div>`;
      inTabs = false;
      tabsMenuHtml = "";
      tabsContentHtml = "";
      currentTabParent = "";
    }
  }

  globalRows.forEach((row, index) => {
    if (index === 0 && getVal(row, 0).includes("Lang")) return; 

    let block = getVal(row, 1);
    let parent = getVal(row, 2).toLowerCase().trim();
    let child = getVal(row, 3).toLowerCase().trim();
    let type = getVal(row, 4).toLowerCase().trim(); 
    
    // ДОБАВЛЕНА ЛОГИКА ВЫБОРА ЯЗЫКА
    let contentRU = getVal(row, 5); 
    let contentUZ = getVal(row, 6); 
    // Если выбран UZ, но он пустой - показываем RU
    let content = currentLang === 'uz' && contentUZ !== "" ? contentUZ : contentRU; 
    
    if (!type && !content) return; 

    // Логика блоков
    if (currentBlock !== block) {
      flushTabs();   
      closeGroups(""); 
      if (currentBlock !== null) { mainHtml += `</div>`; } 
      mainHtml += `<div id="block-${block}" class="page-block">`; 
      currentBlock = block;
    }

    if (inTabs) {
      if (type === 'tab') currentTabParent = parent;
      else if (parent !== currentTabParent) flushTabs(); 
    }

    closeGroups(type); 

    // Отрисовка элементов
    if (type === "name") {
      let nextType = getVal(globalRows[index+1], 4).toLowerCase().trim();
      let subHtml = "";
      if (nextType === "subname") {
        let subRU = getVal(globalRows[index+1], 5);
        let subUZ = getVal(globalRows[index+1], 6);
        let subContent = currentLang === 'uz' && subUZ !== "" ? subUZ : subRU;
        subHtml = `<div class="hero-subtitle">${subContent}</div>`;
        globalRows[index+1].processed = true; 
      }
      appendHtml(`<div class="hero-header"><h1 class="hero-title">${content}</h1>${subHtml}</div>`);
    }
    else if (type === "subname" && row.processed) return;
    
    else if (type === "h1") appendHtml(`<h2 class="section-title">${content}</h2>`);
    else if (type === "h2") appendHtml(`<h3 class="sub-title">${content}</h3>`);
    
    else if (type === "text") appendHtml(`<div class="text-block">${content}</div>`);
    
    // GROUPCARD (Строго 3 в ряд)
    else if (type === "groupcard") {
      if (!inCards) { appendHtml(`<div class="cards-wrapper">`); inCards = true; }
      appendHtml(`<div class="simple-card">${content}</div>`);
    }

    else if (type === "giftcard1") {
      if (!inGifts1) { appendHtml(`<div class="gifts-grid-3">`); inGifts1 = true; }
      let p = content.split(",");
      appendHtml(`
        <div class="gift-card">
          <img src="${p[3] ? p[3].trim() : ''}" class="gift-img">
          <div class="gift-title">${p[0] ? p[0].trim() : ''}</div>
          <div class="gift-stat">Цена: <span>${p[1] ? p[1].trim() : ''}</span></div>
          <div class="gift-stat">Баллы: <span>${p[2] ? p[2].trim() : ''}</span></div>
        </div>`);
    }

    else if (type === "giftcard2") {
      if (!inGifts2) { appendHtml(`<div class="gifts-grid-2">`); inGifts2 = true; }
      let p = content.split(",");
      appendHtml(`
        <div class="gift-card">
          <img src="${p[3] ? p[3].trim() : ''}" class="gift-img">
          <div class="gift-title">${p[0] ? p[0].trim() : ''}</div>
          <div class="gift-stat">Цена: <span>${p[1] ? p[1].trim() : ''}</span></div>
          <div class="gift-stat">Баллы: <span>${p[2] ? p[2].trim() : ''}</span></div>
        </div>`);
    }

    else if (type === "tablecard") {
      let items = content.split(","); 
      let cardsHtml = `<div class="photo-grid">`;
      items.forEach(item => {
        let parts = item.split("<br>"); 
        let name = parts[0] ? parts[0].trim() : "";
        let imgUrl = parts[1] ? parts[1].trim() : "";
        if (name || imgUrl) {
          cardsHtml += `
            <div class="photo-card">
              ${imgUrl ? `<img src="${imgUrl}" class="photo-img">` : ''}
              <div class="photo-title">${name}</div>
            </div>`;
        }
      });
      cardsHtml += `</div>`;
      appendHtml(cardsHtml); 
    }

    else if (type === "tab") {
      if (!inTabs) {
        inTabs = true;
        tabCount = 0;
        currentTabParent = parent;
        tabsMenuHtml = `<div class="tabs-menu">`;
      }
      tabCount++;
      let activeClass = tabCount === 1 ? "active" : "";
      
      tabsMenuHtml += `<button class="tab-btn ${activeClass}" onclick="switchTab('tab-${currentBlock}-${tabCount}')">${content}</button>`;
      
      if (tabCount > 1) tabsContentHtml += `</div>`; 
      tabsContentHtml += `<div id="tab-${currentBlock}-${tabCount}" class="tab-content ${activeClass}">`; 
    }

    else if (type === "rewardtable" || type === "itemtable") {
      let cols = content.split(",");
      if (!inTable) {
        let rowHtml = `<div class="table-wrapper"><table class="styled-table"><thead><tr>`;
        cols.forEach(c => rowHtml += `<th>${c.trim()}</th>`);
        rowHtml += `</tr></thead><tbody>`;
        appendHtml(rowHtml);
        inTable = true;
      } else {
        let rowHtml = `<tr>`;
        cols.forEach(c => {
          let text = c.trim();
          if (text.startsWith("http")) rowHtml += `<td><img src="${text}" alt="icon"></td>`;
          else rowHtml += `<td>${text}</td>`;
        });
        rowHtml += `</tr>`;
        appendHtml(rowHtml);
      }
    }
  });

  flushTabs();
  closeGroups("");
  if (currentBlock !== null) mainHtml += `</div>`; 

  document.getElementById("landing-content").innerHTML = mainHtml;
}

window.switchTab = function(tabId) {
  let blockWrapper = event.target.closest('.page-block');
  
  blockWrapper.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  blockWrapper.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
  
  event.target.classList.add('active');
  document.getElementById(tabId).classList.add('active');
};

loadLandingData();
</script>

</body>
</html>
