<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Семейная Лига - Информация</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --accent: #10b981;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Tabs (Уровень 1) */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            color: var(--text-main);
            background-color: rgba(255,255,255,0.05);
        }

        .tab-btn.active {
            color: #fff;
            background-color: var(--primary);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        /* Subtabs (Уровень 2) */
        .subtabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .subtab-btn {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .subtab-btn:hover {
            border-color: var(--primary-hover);
        }

        .subtab-btn.active {
            background-color: rgba(59, 130, 246, 0.1);
            border-color: var(--primary);
            color: var(--primary-hover);
        }

        /* Content Area */
        .content-area {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
            animation: fadeIn 0.4s ease;
        }

        /* Карточки с правилами */
        .rule-block {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        .rule-block:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .rule-title {
            font-size: 18px;
            color: var(--primary-hover);
            margin: 0 0 10px 0;
        }
        .rule-text {
            white-space: pre-wrap; /* Сохраняет переносы строк из таблицы */
            color: #cbd5e1;
        }
        .rule-text a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
        }
        .rule-text a:hover {
            text-decoration: underline;
        }

        /* Таблицы (для наград) */
        .data-table-wrapper {
            overflow-x: auto;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .data-table th, .data-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .data-table th {
            background-color: rgba(255,255,255,0.05);
            color: var(--primary-hover);
            font-weight: 600;
        }
        .data-table tr:hover {
            background-color: rgba(255,255,255,0.02);
        }

        /* Загрузка */
        #loader {
            text-align: center;
            font-size: 18px;
            color: var(--text-muted);
            padding: 50px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>👑 Семейная Лига BIGO</h1>
    
    <div id="loader">Загрузка данных из таблицы... ⏳</div>

    <div class="tabs" id="tabs-container" style="display: none;"></div>
    <div class="subtabs" id="subtabs-container" style="display: none;"></div>
    <div class="content-area" id="content-container" style="display: none;"></div>
</div>

<script>
    // ID вашей Гугл-таблицы из ссылки
    const sheetId = '1P_2Vko2-RA4VXFCqzMYE20hp5MjJsQ4zh_bU0ohYbII';
    const gid = '1082140898'; 
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;

    let siteData = {}; // Здесь будет храниться структурированная таблица

    // 1. Функция скачивания и обработки CSV
    async function fetchData() {
        try {
            const response = await fetch(csvUrl);
            const csvText = await response.text();
            parseCSVtoObject(csvText);
            initUI();
        } catch (error) {
            document.getElementById('loader').innerText = '❌ Ошибка загрузки. Убедитесь, что таблица имеет доступ "Все, у кого есть ссылка - Читатель".';
            console.error(error);
        }
    }

    // Правильный парсер CSV (учитывает переносы строк и кавычки внутри ячеек)
    function parseCSVtoObject(csv) {
        const rows = [];
        let row = [], col = "", inQuotes = false;
        
        for (let i = 0; i < csv.length; i++) {
            let char = csv[i], nextChar = csv[i+1];
            if (char === '"' && inQuotes && nextChar === '"') {
                col += '"'; i++; // экранированные кавычки
            } else if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                row.push(col.trim()); col = "";
            } else if ((char === '\n' || char === '\r') && !inQuotes) {
                if (char === '\r' && nextChar === '\n') i++; // Windows newline
                row.push(col.trim());
                rows.push(row);
                row = []; col = "";
            } else {
                col += char;
            }
        }
        if (col || row.length) {
            row.push(col.trim());
            rows.push(row);
        }

        // Структурируем: siteData[Tab][Subtab] = [Строка1, Строка2...]
        // Пропускаем первую строку (заголовки таблицы: Сабтаб, Саб-сабтаб и тд)
        for (let i = 1; i < rows.length; i++) {
            const r = rows[i];
            if (r.length < 3 || !r[0]) continue; // Пропуск пустых строк

            const tab = r[0]; // Колонка A
            const subtab = r[1]; // Колонка B
            
            if (!siteData[tab]) siteData[tab] = {};
            if (!siteData[tab][subtab]) siteData[tab][subtab] = [];
            
            siteData[tab][subtab].push(r);
        }
    }

    // 2. Создание интерфейса (Табы)
    function initUI() {
        document.getElementById('loader').style.display = 'none';
        const tabsContainer = document.getElementById('tabs-container');
        tabsContainer.style.display = 'flex';

        const tabs = Object.keys(siteData);
        if (tabs.length === 0) return;

        tabs.forEach((tab, index) => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (index === 0 ? ' active' : '');
            btn.innerText = tab;
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderSubtabs(tab);
            };
            tabsContainer.appendChild(btn);
        });

        // Открываем первую вкладку по умолчанию
        renderSubtabs(tabs[0]);
    }

    // 3. Создание Сабтабов (Уровень 2)
    function renderSubtabs(tabName) {
        const subtabsContainer = document.getElementById('subtabs-container');
        subtabsContainer.innerHTML = '';
        subtabsContainer.style.display = 'flex';

        const subtabs = Object.keys(siteData[tabName]);
        
        subtabs.forEach((subtab, index) => {
            const btn = document.createElement('button');
            btn.className = 'subtab-btn' + (index === 0 ? ' active' : '');
            btn.innerText = subtab || 'Основное'; // Если колонка B пустая
            btn.onclick = () => {
                document.querySelectorAll('.subtab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderContent(tabName, subtab);
            };
            subtabsContainer.appendChild(btn);
        });

        // Открываем первый сабтаб по умолчанию
        renderContent(tabName, subtabs[0]);
    }

    // 4. Отрисовка контента (Текст или Таблица)
    function renderContent(tabName, subtabName) {
        const contentContainer = document.getElementById('content-container');
        contentContainer.style.display = 'block';
        contentContainer.innerHTML = '';
        
        const rows = siteData[tabName][subtabName];

        // Проверяем, таблица это или просто текст. 
        // Если в 3-й строке данных есть Колонка E (индекс 4) - рисуем как HTML таблицу
        // Проверяем 2-ю строку, т.к. 1-я может быть заголовком
        let isTable = false;
        if (rows.length > 1 && rows[1].length >= 5 && rows[1][4] !== "") {
            isTable = true;
        }

        if (isTable) {
            // Отрисовка ТАБЛИЦЫ (Награды, Рейтинги)
            let html = '<div class="data-table-wrapper"><table class="data-table">';
            rows.forEach((row, index) => {
                if (index === 0) {
                    html += `<tr><th>${row[2]}</th><th>${row[3]}</th><th>${row[4]}</th></tr>`;
                } else {
                    html += `<tr><td>${row[2] || ''}</td><td>${row[3] || ''}</td><td>${row[4] || ''}</td></tr>`;
                }
            });
            html += '</table></div>';
            contentContainer.innerHTML = html;
        } else {
            // Отрисовка ТЕКСТА (Правила)
            rows.forEach(row => {
                const title = row[2] || '';
                const text = row[3] || '';
                
                // Обработка HTML ссылок внутри текста (чтобы <a> теги работали)
                let formattedText = text;
                
                if (title || text) {
                    contentContainer.innerHTML += `
                        <div class="rule-block">
                            ${title ? `<h3 class="rule-title">${title}</h3>` : ''}
                            ${text ? `<div class="rule-text">${formattedText}</div>` : ''}
                        </div>
                    `;
                }
            });
        }
    }

    // Запускаем магию!
    fetchData();

</script>
</body>
</html>
