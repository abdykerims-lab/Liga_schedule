<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подключение к VPN...</title>
</head>
<body style="background-color: #1a1a1a; color: white; text-align: center; font-family: Arial, sans-serif; padding-top: 50px;">
    <h2>⏳ Открываем приложение...</h2>
    <p>Если приложение Happ Plus не открылось автоматически, нажмите кнопку ниже:</p>
    <a id="vpn-link" href="#" style="display: inline-block; padding: 15px 30px; background-color: #0088cc; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; margin-top: 20px;">ОТКРЫТЬ VPN</a>

    <script>
        // Получаем ключ vless:// из ссылки (всё, что идет после ?url=)
        const params = new URLSearchParams(window.location.search);
        const vpnUrl = params.get('url');

        if (vpnUrl) {
            // Вставляем ссылку в кнопку
            document.getElementById('vpn-link').href = vpnUrl;
            // Автоматически перенаправляем в приложение!
            window.location.href = vpnUrl;
        } else {
            document.body.innerHTML = "<h2>❌ Ошибка: Ключ не найден</h2>";
        }
    </script>
</body>
</html>
