<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Семейная Лига BIGO</title>
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --primary: #3b82f6;
            --primary-hover: #60a5fa; --text-main: #f8fafc; --text-muted: #94a3b8;
            --border-color: #334155; --accent: #10b981;
        }
        
        * { box-sizing: border-box; }
        
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* Шапка и Языки */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--border-color); }
        h1 { margin: 0; font-size: 28px; background: linear-gradient(90deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .lang-switcher { display: flex; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 4px; }
        .lang-btn { background: transparent; border: none; color: var(--text-muted); padding: 6px 16px; border-radius: 16px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .lang-btn.active { background: var(--primary); color: white; box-shadow: 0 2px 10px rgba(59, 130, 246, 0.4); }

        /* Главное меню */
        .main-menu { display: flex; gap: 10px; margin-bottom: 25px; }
        .main-btn { background: var(--card-bg); color: var(--text-muted); border: 2px solid var(--border-color); font-size: 18px; font-weight: bold; cursor: pointer; padding: 12px 20px; border-radius: 12px; transition: 0.3s; flex: 1; text-align: center; }
        .main-btn:hover { border-color: var(--primary-hover); color: var(--text-main); }
        .main-btn.active { background-color: var(--primary); border-color: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }

        /* Подменю (Rewards) */
        .tabs, .subtabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn, .subtab-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); padding: 8px 18px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 15px;}
        .tab-btn.active, .subtab-btn.active { background-color: rgba(59, 130, 246, 0.15); border-color: var(--primary); color: var(--primary-hover); }

        /* Контент */
        .content-area { background-color: var(--card-bg); border-radius: 12px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 1px solid var(--border-color); animation: fadeIn 0.4s ease; }
        
        /* Стили для блоков и текста */
        .cal-row, .rule-block { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
        .cal-row:last-child, .rule-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0;}
        .cal-title { color: var(--primary-hover); font-size: 18px; margin: 0 0 5px 0; }
        .cal-text, .rule-text { color: #cbd5e1; font-size: 16px; }
        .action-button { display: inline-block; background: var(--accent); color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 10px; transition: 0.2s; font-size: 15px;}
        .action-button:hover { background: #059669; transform: scale(1.05); }
        .main-title { font-size: 24px; color: #fff; text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--primary); padding-bottom: 10px;}

        /* Таблицы */
        .data-table-wrapper { overflow-x: auto; margin: 15px 0; border-radius: 8px; border: 1px solid var(--border-color); }
        .data-table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.2); font-size: 15px;}
        .data-table th, .data-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border-color); white-space: nowrap; }
        .data-table th { background-color: rgba(255,255,255,0.05); color: var(--accent); }
        .cell-img { max-width: 70px; max-height: 70px; border-radius: 8px; object-fit: contain; }

        #loader { text-align: center; color: var(--text-muted); padding: 50px; font-size: 18px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Мобильная адаптация */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .content-area { padding: 15px; }
            h1 { font-size: 22px; }
            .lang-btn { padding: 4px 12px; font-size: 14px; }
            .main-menu { gap: 5px; }
            .main-btn { font-size: 13px; padding: 10px 5px; border-radius: 8px; border-width: 1px; }
            .tab-btn { font-size: 13px; padding: 6px 12px; }
            .subtab-btn { font-size: 12px; padding: 5px 10px; }
            .main-title { font-size: 20px; margin-bottom: 15px; }
            .cal-title { font-size: 16px; }
            .cal-text, .rule-text { font-size: 14px; line-height: 1.4; }
            .data-table { font-size: 13px; }
            .data-table th, .data-table td { padding: 8px 10px; }
            .cell-img { max-width: 50px; max-height: 50px; }
            .action-button { padding: 8px 15px; font-size: 13px; width: 100%; text-align: center;}
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>👑 Семейная Лига</h1>
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="setLang('RU')">RU</button>
            <button class="lang-btn" onclick="setLang('UZ')">UZ</button>
        </div>
    </div>

    <!-- Меню -->
    <div class="main-menu" id="main-menu" style="display: none;">
        <button class="main-btn active" onclick="switchMainTab('Rewards')">Награды</button>
        <button class="main-btn" onclick="switchMainTab('Calendar')">Календарь</button>
        <button class="main-btn" onclick="switchMainTab('Rules')">Правила</button>
    </div>
    
    <div id="loader">Загрузка данных (0/3)... ⏳</div>

    <div id="rewards-nav" style="display: none;">
        <div class="tabs" id="tabs-container"></div>
        <div class="subtabs" id="subtabs-container"></div>
    </div>

    <div class="content-area" id="content-container" style="display: none;"></div>
</div>

<script>
    // ==========================================
    // ВАШИ ОБНОВЛЕННЫЕ GID (ID ЛИСТОВ)
    // ==========================================
    const sheetId = '1P_2Vko2-RA4VXFCqzMYE20hp5MjJsQ4zh_bU0ohYbII';
    const GIDS = { 
        'Rewards': '1090262398',  // Обновленный GID Наград
        'Calendar': '691237427',  // GID Календаря
        'Rules': '0'              // GID Правил
    };

    let allData = { 'Rewards': [], 'Calendar': [], 'Rules': [] };
    let parsedRewards = { 'RU': {}, 'UZ': {} }; 
    
    let currentLang = 'RU';
    let currentMainTab = 'Rewards';
    let currentActiveTab = '';    
    let currentActiveSubtab = ''; 

    const getCol = (row, index) => (row && row[index]) ? row[index].trim() : '';

    async function fetchAllData() {
        try {
            let loaded = 0;
            const promises = Object.keys(GIDS).map(async (tabName) => {
                const url = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${GIDS[tabName]}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error(`Ошибка: ${tabName}`);
                const text = await res.text();
                allData[tabName] = parseCSV(text);
                
                loaded++;
                document.getElementById('loader').innerText = `Загрузка данных (${loaded}/3)... ⏳`;
            });

            await Promise.all(promises);
            prepareRewardsData(); 
            initUI();
        } catch (error) {
            document.getElementById('loader').innerText = '❌ Ошибка загрузки. Убедитесь, что таблица доступна.';
        }
    }

    function parseCSV(csv) {
        const rows = [];
        let row = [], col = "", inQ = false;
        for (let i = 0; i < csv.length; i++) {
            let c = csv[i], nc = csv[i+1];
            if (c === '"' && inQ && nc === '"') { col += '"'; i++; }
            else if (c === '"') inQ = !inQ;
            else if (c === ',' && !inQ) { row.push(col.trim()); col = ""; }
            else if ((c === '\n' || c === '\r') && !inQ) {
                if (c === '\r' && nc === '\n') i++;
                row.push(col.trim()); rows.push(row); row = []; col = "";
            } else col += c;
        }
        if (col || row.length) { row.push(col.trim()); rows.push(row); }
        return rows;
    }

    function prepareRewardsData() {
        const rows = allData['Rewards'];
        
        let lastRuTab = '', lastRuSub = '';
        let lastUzTab = '', lastUzSub = '';

        for (let i = 1; i < rows.length; i++) { 
            const r = rows[i];
            
            // --- Парсинг RU (A, B, C, D, E) ---
            let rTab = getCol(r, 0); if (rTab) lastRuTab = rTab; // A
            let rSub = getCol(r, 1); if (rSub) lastRuSub = rSub; // B
            let rC1 = getCol(r, 2), rC2 = getCol(r, 3), rC3 = getCol(r, 4); // C, D, E
            
            if (lastRuTab && lastRuSub && (rC1 || rC2 || rC3)) {
                if (!parsedRewards['RU'][lastRuTab]) parsedRewards['RU'][lastRuTab] = {};
                if (!parsedRewards['RU'][lastRuTab][lastRuSub]) parsedRewards['RU'][lastRuTab][lastRuSub] = [];
                parsedRewards['RU'][lastRuTab][lastRuSub].push({ c1: rC1, c2: rC2, c3: rC3 });
            }

            // --- Парсинг UZ (F, G, H, I, J) ---
            let uTab = getCol(r, 5); if (uTab) lastUzTab = uTab; // F
            let uSub = getCol(r, 6); if (uSub) lastUzSub = uSub; // G
            let uC1 = getCol(r, 7), uC2 = getCol(r, 8), uC3 = getCol(r, 9); // H, I, J
            
            if (lastUzTab && lastUzSub && (uC1 || uC2 || uC3)) {
                if (!parsedRewards['UZ'][lastUzTab]) parsedRewards['UZ'][lastUzTab] = {};
                if (!parsedRewards['UZ'][lastUzTab][lastUzSub]) parsedRewards['UZ'][lastUzTab][lastUzSub] = [];
                parsedRewards['UZ'][lastUzTab][lastUzSub].push({ c1: uC1, c2: uC2, c3: uC3 });
            }
        }
    }

    function initUI() {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('main-menu').style.display = 'flex';
        switchMainTab('Rewards');
    }

    function setLang(lang) {
        const oldLang = currentLang;
        currentLang = lang;
        
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        const mainBtns = document.querySelectorAll('.main-btn');
        mainBtns[0].innerText = lang === 'RU' ? 'Награды' : 'Mukofotlar';
        mainBtns[1].innerText = lang === 'RU' ? 'Календарь' : 'Taqvim';
        mainBtns[2].innerText = lang === 'RU' ? 'Правила' : 'Qoidalar';

        if (currentMainTab === 'Rewards') {
            const oldTabs = Object.keys(parsedRewards[oldLang] || {});
            const newTabs = Object.keys(parsedRewards[lang] || {});
            const tabIdx = oldTabs.indexOf(currentActiveTab);
            
            currentActiveTab = (tabIdx !== -1 && newTabs[tabIdx]) ? newTabs[tabIdx] : newTabs[0];

            if (currentActiveTab) {
                const oldSubtabs = Object.keys(parsedRewards[oldLang][oldTabs[tabIdx]] || {});
                const newSubtabs = Object.keys(parsedRewards[lang][currentActiveTab] || {});
                const subIdx = oldSubtabs.indexOf(currentActiveSubtab);
                currentActiveSubtab = (subIdx !== -1 && newSubtabs[subIdx]) ? newSubtabs[subIdx] : newSubtabs[0];
            }
            renderRewardsNav();
        } else {
            renderCurrentView();
        }
    }

    function switchMainTab(tab) {
        currentMainTab = tab;
        document.querySelectorAll('.main-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('rewards-nav').style.display = (tab === 'Rewards') ? 'block' : 'none';
        
        if (tab === 'Rewards') {
            const tabs = Object.keys(parsedRewards[currentLang] || {});
            if (!currentActiveTab || !tabs.includes(currentActiveTab)) {
                currentActiveTab = tabs[0];
            }
            renderRewardsNav();
        } else {
            renderCurrentView();
        }
    }

    function renderCurrentView() {
        const container = document.getElementById('content-container');
        container.style.display = 'block';
        
        if (currentMainTab === 'Rewards') renderRewardsContent();
        else if (currentMainTab === 'Calendar') renderCalendarContent();
        else if (currentMainTab === 'Rules') renderRulesContent();
    }

    function renderRewardsNav() {
        const tabsContainer = document.getElementById('tabs-container');
        const subtabsContainer = document.getElementById('subtabs-container');
        tabsContainer.innerHTML = ''; subtabsContainer.innerHTML = '';

        const tabs = Object.keys(parsedRewards[currentLang] || {});
        tabs.forEach(tab => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (tab === currentActiveTab ? ' active' : '');
            btn.innerText = tab;
            btn.onclick = () => { currentActiveTab = tab; currentActiveSubtab = Object.keys(parsedRewards[currentLang][tab])[0]; renderRewardsNav(); };
            tabsContainer.appendChild(btn);
        });

        if (currentActiveTab && parsedRewards[currentLang][currentActiveTab]) {
            const subtabs = Object.keys(parsedRewards[currentLang][currentActiveTab]);
            if (!currentActiveSubtab || !subtabs.includes(currentActiveSubtab)) {
                currentActiveSubtab = subtabs[0];
            }
            
            subtabs.forEach(sub => {
                const btn = document.createElement('button');
                btn.className = 'subtab-btn' + (sub === currentActiveSubtab ? ' active' : '');
                btn.innerText = sub;
                btn.onclick = () => { currentActiveSubtab = sub; renderRewardsNav(); };
                subtabsContainer.appendChild(btn);
            });
        }
        renderCurrentView();
    }

    function renderRewardsContent() {
        const tabData = parsedRewards[currentLang][currentActiveTab] || {};
        const rows = tabData[currentActiveSubtab] || [];
        
        let html = '';
        let inFullTable = false, inMiniTable = false;

        const fmt = (text) => {
            if (!text) return '';
            if (text.startsWith('http')) return `<img src="${text}" class="cell-img" alt="img">`;
            return text.replace(/\n/g, '<br>');
        };

        rows.forEach((row) => {
            let { c1, c2, c3 } = row;

            if (c1 && c2 && c3) {
                if (inMiniTable) { html += '</table></div>'; inMiniTable = false; }
                
                if (!inFullTable) { 
                    html += `<div class="data-table-wrapper"><table class="data-table">`; 
                    inFullTable = true;
                    html += `<tr><th>${fmt(c1)}</th><th>${fmt(c2)}</th><th>${fmt(c3)}</th></tr>`;
                } else {
                    html += `<tr><td>${fmt(c1)}</td><td>${fmt(c2)}</td><td>${fmt(c3)}</td></tr>`;
                }
            } 
            else if (!c1 && c2 && c3) {
                if (inFullTable) { html += '</table></div>'; inFullTable = false; }
                
                if (!inMiniTable) { 
                    html += `<div class="data-table-wrapper"><table class="data-table" style="max-width:500px;">`; 
                    inMiniTable = true; 
                }
                html += `<tr><td>${fmt(c2)}</td><td>${fmt(c3)}</td></tr>`;
            } 
            else {
                if (inFullTable) { html += '</table></div>'; inFullTable = false; }
                if (inMiniTable) { html += '</table></div>'; inMiniTable = false; }
                
                html += `<div class="rule-block">`;
                if (c1) html += `<h3 class="cal-title">${c1}</h3>`;
                if (c2) html += `<div class="rule-text">${fmt(c2)}</div>`;
                html += `</div>`;
            }
        });

        if (inFullTable || inMiniTable) html += `</table></div>`;
        document.getElementById('content-container').innerHTML = html || `<div class="rule-text">Данные отсутствуют.</div>`;
    }

    function renderCalendarContent() {
        const rows = allData['Calendar'];
        let html = '<div>';
        let hasData = false;
        
        rows.forEach((row, idx) => {
            if (idx === 0) return; 
            let title = currentLang === 'RU' ? getCol(row, 0) : getCol(row, 2);
            let value = currentLang === 'RU' ? getCol(row, 1) : getCol(row, 3);

            if (!title && !value) return;
            hasData = true;

            html += `<div class="cal-row">`;
            if (title) html += `<h3 class="cal-title">${title}</h3>`;
            
            if (value) {
                if (value.startsWith('http')) {
                    const btnText = currentLang === 'RU' ? 'Открыть ссылку' : 'Havolani ochish';
                    html += `<a href="${value}" target="_blank" class="action-button">${btnText}</a>`;
                } else {
                    html += `<div class="cal-text">${value.replace(/\n/g, '<br>')}</div>`;
                }
            }
            html += `</div>`;
        });
        
        if (!hasData) html += `<div class="rule-text">Календарь пока пуст.</div>`;
        html += '</div>';
        document.getElementById('content-container').innerHTML = html;
    }

    function renderRulesContent() {
        const rows = allData['Rules'];
        let html = '<div>';
        let hasData = false;
        
        rows.forEach((row, idx) => {
            if (idx === 0) return; 
            let title = currentLang === 'RU' ? getCol(row, 0) : getCol(row, 2); 
            let text = currentLang === 'RU' ? getCol(row, 1) : getCol(row, 3);

            if (!title && !text) return;
            hasData = true;

            if (idx === 1) { 
                html += `<h2 class="main-title">${title}</h2>`;
                if (text) html += `<div class="rule-text" style="margin-bottom:20px;">${text.replace(/\n/g, '<br>')}</div>`;
            } else {
                html += `<div class="rule-block">`;
                if (title) html += `<h3 class="cal-title">${title}</h3>`;
                if (text) html += `<div class="rule-text">${text.replace(/\n/g, '<br>')}</div>`;
                html += `</div>`;
            }
        });
        
        if (!hasData) html += `<div class="rule-text">Правила формируются.</div>`;
        html += '</div>';
        document.getElementById('content-container').innerHTML = html;
    }

    fetchAllData();
</script>
</body>
</html>
