<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Семейная Лига BIGO - Расписание и Результаты</title>

<!-- ШРИФТ EXO 2 -->
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-page: #0d1115;       
    --bg-table: rgba(33, 38, 45, 0.8); 
    --teal-dark: rgba(18, 63, 69, 0.9);     
    --teal-light: rgba(24, 108, 114, 0.9);    
    --orange: #f5a631;        
    --orange-bg: linear-gradient(135deg, #f5a631, #ff7a00);    
    --text-main: #ffffff;   
    --text-muted: #c9d1d9; 
    --border-line: rgba(245, 166, 49, 0.3);
  }

  body { 
    background-image: linear-gradient(rgba(13, 17, 21, 0.8), rgba(13, 17, 21, 0.95)), url('https://i.ibb.co/xqnNLxj4/1vs1-1.jpg'); 
    background-size: cover;          
    background-position: center;     
    background-attachment: fixed;    
    background-repeat: no-repeat;
    background-color: var(--bg-page); 
    color: var(--text-main); 
    margin: 0; 
    padding: 20px 10px; 
    font-family: 'Exo 2', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  * { box-sizing: border-box; }

  .container { max-width: 1200px; margin: 0 auto; }

  /* --- ГЛАВНОЕ МЕНЮ --- */
  .main-menu { 
    display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; 
  }
  .main-btn { 
    background-color: rgba(31, 41, 55, 0.8); 
    color: var(--text-muted); 
    border: none; 
    font-size: 16px; 
    font-weight: 800; 
    text-transform: uppercase;
    cursor: pointer; 
    padding: 14px 20px; 
    border-radius: 8px; 
    transition: 0.3s; 
    text-align: center; 
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.05);
    flex: 1;
    min-width: 200px;
  }
  .main-btn:hover { color: #fff; background-color: rgba(255,255,255,0.1); }
  .main-btn.active { 
    background-color: var(--teal-dark); 
    color: var(--orange); 
    border-bottom: 4px solid var(--orange);
    text-shadow: 0 0 10px rgba(245, 166, 49, 0.3);
  }

  /* --- СЕТКА ОСНОВНОГО КОНТЕНТА --- */
  .main-layout {
    display: flex; gap: 20px; align-items: flex-start;
  }

  /* --- БОКОВОЕ МЕНЮ (ДАТЫ) --- */
  .sidebar { flex: 0 0 200px; display: flex; flex-direction: column; gap: 10px; transition: 0.3s; }
  
  .date-btn {
    background-color: rgba(24, 29, 35, 0.85);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.05);
    padding: 12px 15px; border-radius: 8px; cursor: pointer; font-size: 15px;
    font-weight: 800; color: var(--text-muted); transition: all 0.3s ease;
    text-align: center; letter-spacing: 1px;
  }
  .date-btn:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
  .date-btn.active {
    background: var(--teal-light); 
    border: 1px solid var(--border-line);
    color: var(--orange); 
    box-shadow: 0 0 15px rgba(245, 166, 49, 0.15);
  }

  /* --- ЦЕНТРАЛЬНАЯ ЧАСТЬ --- */
  .content { flex: 1; width: 100%; display: flex; flex-direction: column; gap: 20px; min-width: 0; }

  /* --- ПОИСК --- */
  .search-box { 
    background-color: rgba(24, 29, 35, 0.85); 
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border-line); 
    border-radius: 12px; padding: 12px 20px; display: flex; align-items: center; 
  }
  .search-box input {
    width: 100%; background: transparent; border: none;
    color: #fff; font-size: 16px; outline: none;
    font-family: 'Exo 2', sans-serif;
  }
  .search-box input::placeholder { color: rgba(255,255,255,0.4); }

  /* --- СПИСКИ --- */
  .data-list { display: flex; flex-direction: column; gap: 15px; }

  .data-row {
    background-color: rgba(24, 29, 35, 0.85); 
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);      
    border: 1px solid var(--border-line); 
    border-radius: 12px; padding: 15px 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
    transition: transform 0.2s, box-shadow 0.2s; position: relative;
    display: flex; align-items: center; gap: 15px;
  }
  .data-row:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
  
  .match-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 15px; }

  /* ТЕКСТЫ */
  .player-name { font-weight: 800; font-size: 18px; color: var(--text-main); display: block; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
  .clan-name { font-size: 13px; color: var(--text-muted); display: block; margin-bottom: 6px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; text-transform: uppercase;}
  
  .clan-id { 
    font-family: monospace; font-size: 12px; color: var(--text-main); 
    background: var(--teal-dark); padding: 3px 8px; 
    border-radius: 6px; border: 1px solid var(--border-line);
    display: inline-block; font-weight: 600; letter-spacing: 0.5px;
  }
  
  .date-badge { 
    position: absolute; top: -12px; right: 15px; 
    background: var(--orange-bg); color: #000; font-size: 11px; 
    padding: 4px 10px; border-radius: 8px; font-weight: 800;
  }

  /* БЛОК МАТЧА (VS) */
  .match-center { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .team-block { display: flex; flex-direction: column; line-height: 1.4; min-width: 0; }
  .team-block.left { text-align: left; align-items: flex-start; }
  .team-block.right { text-align: right; align-items: flex-end; }

  .time-badge {
    background: rgba(0, 0, 0, 0.6); padding: 6px 14px; border-radius: 8px;
    font-size: 15px; font-weight: 800; color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); 
  }
  .vs-text { 
    text-align: center; margin-top: 8px; color: var(--orange); font-size: 14px; font-weight: 800; 
  }

  /* РЕЙТИНГИ */
  .rank-box { font-size: 18px; font-weight: 800; color: var(--text-muted); min-width: 40px; text-align: center; flex-shrink: 0; }
  .rank-1 { color: #facc15; font-size: 26px; text-shadow: 0 0 15px rgba(250, 204, 21, 0.5); }
  .rank-2 { color: #e2e8f0; font-size: 22px; text-shadow: 0 0 10px rgba(226, 232, 240, 0.3); }
  .rank-3 { color: #f97316; font-size: 20px; text-shadow: 0 0 10px rgba(249, 115, 22, 0.3); }

  .result-details { flex-grow: 1; text-align: left; min-width: 0; }
  .result-score-box { text-align: right; display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }
  
  .score-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
  .score-value { 
    font-size: 20px; font-weight: 800; color: var(--orange); 
    text-shadow: 0 0 10px rgba(245, 166, 49, 0.2);
  }

  .eagle-img { height: 26px; width: auto; object-fit: contain; margin-top: 6px; }
  .loading { text-align: center; padding: 40px; color: var(--orange); font-size: 18px; width: 100%; font-weight: 800; }

  /* =========================================
     МОБИЛЬНАЯ АДАПТАЦИЯ
     ========================================= */
  @media (max-width: 768px) {
    .container { padding: 0; }
    .main-menu { gap: 6px; border-radius: 12px; margin-bottom: 15px;}
    .main-btn { min-width: unset; width: calc(50% - 3px); flex: none; padding: 12px 5px; font-size: 12px; border-radius: 8px;}
    
    .main-layout { flex-direction: column; gap: 15px; }
    
    /* ИСПРАВЛЕНО: Даты выстраиваются по левому краю и переносятся на новую строку (как теги) */
    .sidebar { 
      flex: none; 
      height: auto; 
      width: 100%; 
      flex-direction: row; 
      flex-wrap: wrap;             /* Включает перенос строк */
      justify-content: flex-start; /* Строго по левому краю */
      padding-bottom: 0; 
      gap: 8px; 
    }
    
    .date-btn { 
      flex: 0 0 auto; 
      height: max-content; 
      padding: 8px 18px;          /* Чуть более компактные отступы */
      font-size: 13px; 
      border-radius: 20px;        /* Форма красивой таблетки */
    }
    
    .content { gap: 12px; }
    .search-box { padding: 10px 15px; border-radius: 10px;}
    .search-box input { font-size: 14px; }

    .data-row { padding: 15px 12px; border-radius: 10px; gap: 8px; }
    .match-row { gap: 6px; }
    
    .player-name { font-size: 15px; }
    .clan-name { font-size: 11px; margin-bottom: 4px;}
    .clan-id { font-size: 10px; padding: 2px 6px; }
    .time-badge { font-size: 13px; padding: 4px 8px; }
    .vs-text { font-size: 11px; margin-top: 4px; }
    
    .rank-box { min-width: 35px; font-size: 15px; }
    .rank-1 { font-size: 22px; }
    .rank-2 { font-size: 19px; }
    .rank-3 { font-size: 17px; }
    
    .score-value { font-size: 16px; }
    .score-label { font-size: 9px; }
    .eagle-img { height: 20px; margin-top: 4px; } 
  }
</style>
</head>
<body>

  <div class="container">
    <div class="main-menu">
      <button id="tab-schedule" class="main-btn active" onclick="switchTab('schedule')">Расписание ПК</button>
      <button id="tab-results" class="main-btn" onclick="switchTab('results')">Результаты ПК</button>
      <button id="tab-families" class="main-btn" onclick="switchTab('families')">Рейтинг Семей</button>
      <button id="tab-participants" class="main-btn" onclick="switchTab('participants')">Рейтинг Участников</button>
    </div>

    <div class="main-layout">
      <div class="sidebar" id="sidebar"></div>
      <div class="content">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Поиск (Имя, ID, Семья)..." onkeyup="handleSearch()">
        </div>
        <div id="data-container">
          <div class="loading">Загрузка данных... ⏳</div>
        </div>
      </div>
    </div>
  </div>

<script>
const sheetID = "1ine1ZqJrbK9kok_s7QujVLXhzj5hJuoKcguw8bQT2Jo";
let currentTab = "schedule"; 
let selectedDate = null;
let autoRefreshTimer = null;

const cache = {
  schedule: { dates: [], byDate: {}, loaded: false },
  results:  { dates: [], byDate: {}, loaded: false },
  families: { data: [], loaded: false },
  participants: { data: [], loaded: false }
};

function getVal(row, index) {
  if (!row || !row.c || !row.c[index]) return "";
  if (row.c[index].f) return String(row.c[index].f).trim();
  return String(row.c[index].v || "").trim();
}

function getNum(row, index) {
  if (!row || !row.c || !row.c[index]) return 0;
  const val = row.c[index].v;
  if (typeof val === 'string') return Number(val.replace(/\s/g, '')) || 0;
  return typeof val === 'number' ? val : 0;
}

function parseDate(val) {
  if (!val) return "";
  if (typeof val === "string" && val.startsWith("Date(")) {
    const match = val.match(/Date\((\d+),(\d+),(\d+)/);
    if (match) {
      const y = match[1];
      const m = String(Number(match[2]) + 1).padStart(2, "0");
      const d = String(match[3]).padStart(2, "0");
      return `${d}.${m}.${y}`;
    }
  }
  return val;
}

function formatTime(val) {
  if (Array.isArray(val)) return `${String(val[0]).padStart(2,"0")}:${String(val[1]).padStart(2,"0")}`;
  return val;
}

function parseToDateObj(str) {
  let parts = str.split('.');
  if (parts.length === 3) return new Date(parts[2], parts[1]-1, parts[0]).getTime();
  return 0; 
}

function switchTab(tabName) {
  if (currentTab === tabName && cache[tabName].loaded) return;
  currentTab = tabName;
  
  document.getElementById("searchInput").value = "";

  document.querySelectorAll('.main-btn').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tabName}`).classList.add("active");

  const sidebar = document.getElementById("sidebar");
  
  if (tabName === "families" || tabName === "participants") {
    sidebar.style.display = "none";
  } else {
    sidebar.style.display = "flex";
    sidebar.innerHTML = "";
  }

  document.getElementById("data-container").innerHTML = `<div class="loading">Загрузка данных... ⏳</div>`;

  if (cache[tabName].loaded) {
    if (tabName === "schedule" || tabName === "results") buildSidebar(false);
    else renderContent();
  } else {
    fetchData(tabName, false);
  }
}

function startAutoRefresh() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(() => {
    if (currentTab) fetchData(currentTab, true);
  }, 60000);
}

async function fetchData(tabName, isBackground = false) {
  let gid = "";
  if (tabName === "schedule") gid = "0";
  else if (tabName === "results") gid = "1571908657";
  else if (tabName === "families") gid = "1648616096";
  else if (tabName === "participants") gid = "1546318279";

  const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tq=SELECT%20*&gid=${gid}&_=${Date.now()}`;

  if (!isBackground) {
    document.getElementById("data-container").innerHTML = `<div class="loading">Загрузка данных... ⏳</div>`;
  }

  try {
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substr(47).slice(0, -2));
    const rows = json.table.rows || [];

    if (tabName === "schedule") parseSchedule(rows);
    else if (tabName === "results") parseResults(rows);
    else if (tabName === "families") parseFamilies(rows);
    else if (tabName === "participants") parseParticipants(rows);

    cache[tabName].loaded = true;
    
    if (tabName === "schedule" || tabName === "results") {
      buildSidebar(isBackground);
    } else {
      if (document.getElementById("searchInput").value.trim() !== "") handleSearch();
      else renderContent();
    }
  } catch (e) {
    if (!isBackground) document.getElementById("data-container").innerHTML = `<div class="loading" style="color:var(--orange);">❌ Ошибка загрузки</div>`;
  }
}

function parseSchedule(rows) {
  cache.schedule.dates = []; cache.schedule.byDate = {};
  let currentGroupDate = ""; 
  
  rows.forEach((r, idx) => {
    if (idx === 0) return; 
    
    let rawDate = parseDate(getVal(r, 0)); 
    if (rawDate && rawDate.toLowerCase() !== "дата" && rawDate.toLowerCase() !== "date") {
      currentGroupDate = rawDate;
    }
    
    let date = currentGroupDate;
    if (!date) return; 
    
    let time = formatTime(getVal(r, 1)) || "--:--"; 
    let p1 = getVal(r, 3); 
    let c1_id = getVal(r, 4); 
    let c1_name = getVal(r, 5); 
    let vs = getVal(r, 6) || "VS"; 
    let c2_name = getVal(r, 8); 
    let c2_id = getVal(r, 9); 
    let p2 = getVal(r, 10); 
    
    if (!p1 && !p2) return;

    let searchStr = `${p1} ${c1_id} ${c1_name} ${c2_name} ${c2_id} ${p2}`.toLowerCase();

    if (!cache.schedule.byDate[date]) { cache.schedule.byDate[date] = []; cache.schedule.dates.push(date); }
    cache.schedule.byDate[date].push({ time, p1, c1_id, c1_name, vs, p2, c2_id, c2_name, searchStr });
  });
  
  cache.schedule.dates.sort((a, b) => parseToDateObj(b) - parseToDateObj(a));
  for (let d in cache.schedule.byDate) cache.schedule.byDate[d].sort((a, b) => a.time.localeCompare(b.time));
}

function parseResults(rows) {
  cache.results.dates = []; cache.results.byDate = {};
  let currentGroupDate = ""; 
  
  rows.forEach((r, idx) => {
    if (idx === 0) return;
    
    let rawDate = parseDate(getVal(r, 0)); 
    if (rawDate && rawDate.toLowerCase() !== "дата" && rawDate.toLowerCase() !== "date") {
      currentGroupDate = rawDate;
    }
    
    let date = currentGroupDate;
    if (!date) return;
    
    let fam_id = getVal(r, 2); 
    let fam_name = getVal(r, 5); 
    let player = getVal(r, 6); 
    let scoreNum = getNum(r, 7); 
    let scoreStr = getVal(r, 7) || "0"; 
    
    if (!player && !fam_id) return;

    let eagleImgSrc = "";
    if (scoreNum >= 500000) eagleImgSrc = "https://i.ibb.co/p6fLVxMk/Golden-1.png";
    else if (scoreNum >= 50000) eagleImgSrc = "https://i.ibb.co/m5fQzxRp/Silver-1.png";
    else eagleImgSrc = "https://i.ibb.co/zWmzPJJg/no-eagel.jpg";
    
    let searchStr = `${fam_id} ${fam_name} ${player}`.toLowerCase();

    if (!cache.results.byDate[date]) { cache.results.byDate[date] = []; cache.results.dates.push(date); }
    cache.results.byDate[date].push({ fam_id, fam_name, player, scoreNum, scoreStr, eagleImgSrc, searchStr });
  });
  
  cache.results.dates.sort((a, b) => parseToDateObj(b) - parseToDateObj(a));
  for (let d in cache.results.byDate) cache.results.byDate[d].sort((a, b) => b.scoreNum - a.scoreNum);
}

function parseFamilies(rows) {
  cache.families.data = [];
  rows.forEach((r, idx) => {
    if (idx === 0) return; 
    let id = getVal(r, 1);   
    let name = getVal(r, 2); 
    let score = getVal(r, 3); 
    let scoreNum = getNum(r, 3); 
    if (!name && !id) return;
    
    let searchStr = `${id} ${name}`.toLowerCase();
    cache.families.data.push({ id, name, score, scoreNum, searchStr });
  });

  cache.families.data.sort((a, b) => b.scoreNum - a.scoreNum);
  cache.families.data.forEach((item, idx) => item.globalRank = idx + 1);
}

function parseParticipants(rows) {
  cache.participants.data = [];
  rows.forEach((r, idx) => {
    if (idx === 0) return; 
    let name = getVal(r, 2);   
    let score = getVal(r, 3);  
    let family = getVal(r, 4); 
    let scoreNum = getNum(r, 3); 
    if (!name) return;
    
    let searchStr = `${name} ${family}`.toLowerCase();
    cache.participants.data.push({ name, family, score, scoreNum, searchStr });
  });

  cache.participants.data.sort((a, b) => b.scoreNum - a.scoreNum);
  cache.participants.data.forEach((item, idx) => item.globalRank = idx + 1);
}

/* --- ОТОБРАЖЕНИЕ UI --- */
function buildSidebar(isBackground = false) {
  const dataRef = cache[currentTab];
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";

  if (dataRef.dates.length === 0) {
    document.getElementById("data-container").innerHTML = `<div class="loading">Нет данных</div>`;
    return;
  }

  if (!isBackground || !dataRef.dates.includes(selectedDate)) selectedDate = dataRef.dates[0];

  dataRef.dates.forEach((date) => {
    const btn = document.createElement("div");
    btn.className = "date-btn";
    if (date === selectedDate) btn.classList.add("active");
    btn.innerText = date;
    btn.onclick = () => selectDate(date);
    sidebar.appendChild(btn);
  });
  
  if (document.getElementById("searchInput").value.trim() !== "") handleSearch();
  else renderContent();
}

function selectDate(date) {
  selectedDate = date;
  document.getElementById("searchInput").value = ""; 
  document.querySelectorAll(".date-btn").forEach(btn => {
    btn.classList.toggle("active", btn.innerText === selectedDate);
  });
  renderContent();
}

function handleSearch() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  renderContent(q);
}

function renderContent(searchQuery = "") {
  const container = document.getElementById("data-container");
  const dataRef = cache[currentTab];
  let html = "";
  let itemsToRender = [];

  if (currentTab === "schedule" || currentTab === "results") {
    if (searchQuery !== "") {
      const searchTerms = searchQuery.split(" ").filter(t => t !== "");
      dataRef.dates.forEach(d => {
        dataRef.byDate[d].forEach(item => {
          if (searchTerms.every(term => item.searchStr.includes(term))) itemsToRender.push({ ...item, dateLabel: d });
        });
      });
      document.querySelectorAll(".date-btn").forEach(btn => btn.classList.remove("active"));
    } else {
      itemsToRender = dataRef.byDate[selectedDate] || [];
    }
  } else {
    if (searchQuery !== "") {
      const searchTerms = searchQuery.split(" ").filter(t => t !== "");
      itemsToRender = dataRef.data.filter(item => searchTerms.every(term => item.searchStr.includes(term)));
    } else {
      itemsToRender = dataRef.data || [];
    }
  }

  if (itemsToRender.length === 0) {
    container.innerHTML = `<div class="loading">Ничего не найдено 🤷‍♂️</div>`;
    return;
  }

  html += `<div class="data-list">`;

  if (currentTab === "schedule") {
    itemsToRender.forEach(m => {
      let dateBadge = searchQuery !== "" ? `<div class="date-badge">${m.dateLabel}</div>` : "";
      html += `
        <div class="data-row match-row">
          ${dateBadge}
          <div class="team-block left">
            <span class="player-name">${m.p1 || '—'}</span>
            <span class="clan-name">${m.c1_name || 'Без семьи'}</span>
            <span class="clan-id">ID: ${m.c1_id || '0000'}</span>
          </div>
          <div class="match-center">
            <div class="time-badge">${m.time}</div>
            <div class="vs-text">${m.vs}</div>
          </div>
          <div class="team-block right">
            <span class="player-name">${m.p2 || '—'}</span>
            <span class="clan-name">${m.c2_name || 'Без семьи'}</span>
            <span class="clan-id">ID: ${m.c2_id || '0000'}</span>
          </div>
        </div>`;
    });
  } 
  
  else if (currentTab === "results") {
    itemsToRender.forEach((m, index) => {
      let dateBadge = searchQuery !== "" ? `<div class="date-badge">${m.dateLabel}</div>` : "";
      let rankClass = index === 0 ? "rank-1" : (index === 1 ? "rank-2" : (index === 2 ? "rank-3" : ""));
      html += `
        <div class="data-row">
          ${dateBadge}
          <div class="rank-box ${rankClass}">#${index + 1}</div>
          <div class="result-details">
            <span class="player-name">${m.player}</span>
            <span class="clan-name">${m.fam_name ? "Семья: " + m.fam_name : "Без семьи"}</span>
            <span class="clan-id">ID: ${m.fam_id || '0000'}</span>
          </div>
          <div class="result-score-box">
            <span class="score-label">ПК Очки</span>
            <span class="score-value">${m.scoreStr}</span>
            <img src="${m.eagleImgSrc}" class="eagle-img" loading="lazy" alt="Rank">
          </div>
        </div>`;
    });
  }

  else if (currentTab === "families") {
    itemsToRender.forEach((m) => {
      let r = m.globalRank; 
      let rankClass = r === 1 ? "rank-1" : (r === 2 ? "rank-2" : (r === 3 ? "rank-3" : ""));
      html += `
        <div class="data-row">
          <div class="rank-box ${rankClass}">#${r}</div>
          <div class="result-details">
            <span class="player-name">${m.name}</span>
            <span class="clan-id" style="margin-top: 4px;">Семья ID: ${m.id}</span>
          </div>
          <div class="result-score-box">
            <span class="score-label">Очки Семьи</span>
            <span class="score-value">${m.score}</span>
          </div>
        </div>`;
    });
  }

  else if (currentTab === "participants") {
    itemsToRender.forEach((m) => {
      let r = m.globalRank;
      let rankClass = r === 1 ? "rank-1" : (r === 2 ? "rank-2" : (r === 3 ? "rank-3" : ""));
      html += `
        <div class="data-row">
          <div class="rank-box ${rankClass}">#${r}</div>
          <div class="result-details">
            <span class="player-name">${m.name}</span>
            <span class="clan-name">${m.family ? "Семья: " + m.family : "Без семьи"}</span>
          </div>
          <div class="result-score-box">
            <span class="score-label">Очки Участника</span>
            <span class="score-value">${m.score}</span>
          </div>
        </div>`;
    });
  }

  html += `</div>`;
  container.innerHTML = html;
}

switchTab("schedule");
startAutoRefresh();
</script>
</body>
</html>
