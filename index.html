<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лига - Расписание и Результаты</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

  body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #15092a 0%, #3b1454 100%);
    color: #fff;
    min-height: 100vh;
    box-sizing: border-box;
  }

  * { box-sizing: border-box; }

  /* --- ГЛАССМОРФИЗМ --- */
  .glass {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }

  /* --- ШАПКА И ВКЛАДКИ --- */
  .header { padding: 20px; text-align: center; }
  .tab-container { 
    display: inline-flex; flex-wrap: wrap; gap: 8px; 
    padding: 6px; border-radius: 20px; justify-content: center;
  }
  
  .tab {
    padding: 10px 20px;
    border-radius: 15px;
    font-weight: 600;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #fff;
    cursor: pointer;
    opacity: 0.5;
    transition: all 0.3s ease;
    border: 1px solid transparent;
  }

  .tab:hover { opacity: 1; background: rgba(255, 255, 255, 0.1); }
  .tab.active {
    opacity: 1;
    background: rgba(168, 85, 247, 0.4);
    border: 1px solid rgba(168, 85, 247, 0.6);
    box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
    cursor: default;
  }

  /* --- МАКЕТ --- */
  .main-layout {
    display: flex; max-width: 1200px; margin: 0 auto;
    padding: 10px 20px 40px; gap: 20px; align-items: flex-start;
  }

  /* --- БОКОВАЯ ПАНЕЛЬ С ДАТАМИ --- */
  .sidebar { flex: 0 0 220px; display: flex; flex-direction: column; gap: 10px; }
  
  .date-btn {
    padding: 12px 15px; border-radius: 12px; cursor: pointer; font-size: 15px;
    font-weight: 600; color: #d8b4fe; transition: all 0.3s ease;
    border: 1px solid transparent; text-align: left;
  }
  .date-btn:hover { background: rgba(255, 255, 255, 0.1); }
  .date-btn.active {
    background: rgba(168, 85, 247, 0.3); border: 1px solid rgba(168, 85, 247, 0.6);
    color: #fff; box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
  }

  .content { flex: 1; width: 100%; display: flex; flex-direction: column; gap: 20px; }

  /* --- ПОИСК --- */
  .search-box {
    padding: 12px 20px;
    border-radius: 15px;
    display: flex;
    align-items: center;
  }
  .search-box input {
    width: 100%; background: transparent; border: none;
    color: #fff; font-size: 16px; outline: none;
    font-family: 'Poppins', sans-serif;
  }
  .search-box input::placeholder { color: rgba(255,255,255,0.4); }

  /* --- СТИЛИ ДЛЯ РАСПИСАНИЯ (TAB 1 & 3) --- */
  .schedule-list { display: flex; flex-direction: column; gap: 12px; }
  
  .match-row {
    padding: 15px 20px; border-radius: 15px; display: grid; 
    grid-template-columns: 1fr auto 1fr; align-items: center; gap: 15px;
    transition: transform 0.2s; position: relative;
  }
  .match-row:hover { transform: translateX(5px); background: rgba(255, 255, 255, 0.08); }
  
  .match-center { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .team-block { display: block; line-height: 1.4; }
  .team-block.left { text-align: left; }
  .team-block.right { text-align: right; }

  .player-name { font-weight: 700; font-size: 17px; color: #ffffff; display: block; margin-bottom: 4px; }
  
  /* Синий ID */
  .id-badge { 
    font-family: monospace; font-size: 13px; color: #38bdf8; 
    background: rgba(56, 189, 248, 0.1); padding: 3px 8px; 
    border-radius: 6px; border: 1px solid rgba(56, 189, 248, 0.2);
    display: inline-block; font-weight: 600;
  }
  /* Зеленый статус для свободного слота */
  .id-badge.free-slot {
    color: #4ade80;
    background: rgba(74, 222, 128, 0.1);
    border: 1px solid rgba(74, 222, 128, 0.3);
  }

  .time-badge {
    background: rgba(0, 0, 0, 0.4); padding: 5px 14px; border-radius: 8px;
    font-family: monospace; font-size: 15px; font-weight: bold;
    color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.3); 
  }
  .vs-text { 
    text-align: center; margin-top: 8px; font-style: normal; 
    color: #f43f5e; font-size: 14px; font-weight: 800; text-transform: uppercase;
  }

  /* --- СТИЛИ ДЛЯ РЕЗУЛЬТАТОВ (TAB 2) --- */
  .results-list { display: flex; flex-direction: column; gap: 15px; }

  .result-card {
    padding: 18px 20px; border-radius: 15px;
    display: flex; justify-content: space-between; align-items: center;
    transition: transform 0.2s; position: relative; gap: 15px;
    border-left: 4px solid #a855f7;
  }
  .result-card:hover { transform: translateX(5px); background: rgba(255, 255, 255, 0.08); }

  .res-left { display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .res-right { display: flex; flex-direction: column; gap: 8px; text-align: right; min-width: 150px; }

  .res-winner { font-size: 16px; font-weight: 700; color: #fbbf24; }
  .res-winner span { color: #fff; margin-left: 5px; }
  
  .res-vs { font-size: 13px; color: #cbd5e1; font-weight: 500; }
  .res-vs .vs-red { color: #f43f5e; font-weight: 800; margin: 0 5px; }

  .stat-line { font-size: 12px; color: #94a3b8; font-weight: 600; text-transform: uppercase; }
  .stat-val { font-family: monospace; font-size: 16px; font-weight: 800; margin-left: 6px; padding: 2px 6px; border-radius: 6px; }
  .stat-val.points { color: #4ade80; background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.2); }
  .stat-val.beans { color: #facc15; background: rgba(250, 204, 21, 0.1); border: 1px solid rgba(250, 204, 21, 0.2); }

  .date-badge { 
    position: absolute; top: -10px; right: 15px; 
    background: #a855f7; color: #fff; font-size: 11px; 
    padding: 4px 8px; border-radius: 8px; font-weight: bold;
  }

  .loading { text-align: center; padding: 40px; color: #a78bfa; font-size: 18px; width: 100%; }

  /* --- МОБИЛЬНАЯ АДАПТАЦИЯ --- */
  @media (max-width: 768px) {
    .header { padding: 15px 10px; }
    .tab-container { flex-direction: column; width: 100%; gap: 5px; }
    .tab { font-size: 13px; width: 100%; text-align: center; }
    
    .main-layout { flex-direction: column; padding: 10px; gap: 15px; }
    .sidebar { flex: none; width: 100%; flex-direction: row; overflow-x: auto; padding-bottom: 5px; gap: 8px; }
    .date-btn { white-space: nowrap; padding: 8px 12px; font-size: 13px; border-radius: 10px; }
    
    .match-row { padding: 12px 10px; gap: 10px; }
    .player-name { font-size: 14px; }
    .id-badge { font-size: 11px; padding: 2px 5px; }
    
    .result-card { flex-direction: column; align-items: flex-start; padding: 15px; gap: 12px; }
    .res-right { text-align: left; width: 100%; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
  }
</style>
</head>
<body>

  <div class="header">
    <div class="glass tab-container">
      <div id="tab-sched-royal" class="tab active" onclick="switchTab('sched-royal')">Расписание "Королевский ПК"</div>
      <div id="tab-res-royal" class="tab" onclick="switchTab('res-royal')">Результат "Королевский ПК"</div>
      <div id="tab-sched-mini" class="tab" onclick="switchTab('sched-mini')">Расписание "Мини_ПК"</div>
    </div>
  </div>

  <div class="main-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="content">
      <div class="search-box glass">
        <input type="text" id="searchInput" placeholder="Поиск (по ID или Никнейму)..." onkeyup="handleSearch()">
      </div>
      <div id="data-container">
        <div class="loading">Загрузка данных...</div>
      </div>
    </div>
  </div>

<script>
// НОВЫЙ ID ТАБЛИЦЫ
const sheetID = "13X37rn0LMrezZ-4s-R9h2vaNSioYc9cVLJ0DVMnM3SU";

const tabsConfig = {
  "sched-royal": { sheetName: "Schedule", type: "schedule" },
  "res-royal":   { sheetName: "лист1", type: "result" },
  "sched-mini":  { sheetName: "Schedule Mini", type: "schedule-mini" }
};

let currentTab = "sched-royal"; 
let selectedDate = null;
let autoRefreshTimer = null;

const cache = {
  "sched-royal": { dates: [], byDate: {}, loaded: false },
  "res-royal":   { dates: [], byDate: {}, loaded: false },
  "sched-mini":  { dates: [], byDate: {}, loaded: false }
};

function getVal(row, index) {
  if (!row || !row.c || !row.c[index]) return "";
  if (row.c[index].f) return String(row.c[index].f).trim();
  return String(row.c[index].v || "").trim();
}

function getNum(row, index) {
  if (!row || !row.c || !row.c[index]) return 0;
  const val = row.c[index].v;
  return typeof val === 'number' ? val : (Number(val) || 0);
}

function parseDate(val) {
  if (typeof val === "string" && val.startsWith("Date(")) {
    const match = val.match(/Date\((\d+),(\d+),(\d+)/);
    if (match) {
      const y = match[1];
      const m = String(Number(match[2]) + 1).padStart(2, "0");
      const d = String(match[3]).padStart(2, "0");
      return `${d}.${m}.${y}`;
    }
  }
  return val;
}

function formatTime(val) {
  if (Array.isArray(val)) return `${String(val[0]).padStart(2,"0")}:${String(val[1]).padStart(2,"0")}`;
  return val;
}

function parseToDateObj(str) {
  let parts = str.split('.');
  if (parts.length === 3) return new Date(parts[2], parts[1]-1, parts[0]);
  return new Date(0); 
}

function switchTab(tabId) {
  if (currentTab === tabId && cache[tabId].loaded) return;
  currentTab = tabId;
  
  document.getElementById("searchInput").value = "";

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(`tab-${tabId}`).classList.add("active");

  document.getElementById("sidebar").innerHTML = "";
  document.getElementById("data-container").innerHTML = `<div class="loading">Загрузка данных...</div>`;

  if (cache[tabId].loaded) buildSidebar(false);
  else fetchData(tabId, false);
}

function startAutoRefresh() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(() => {
    if (currentTab) fetchData(currentTab, true);
  }, 60000);
}

async function fetchData(tabId, isBackground = false) {
  const config = tabsConfig[tabId];
  const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tq=SELECT%20*&sheet=${encodeURIComponent(config.sheetName)}`;

  if (!isBackground) {
    document.getElementById("data-container").innerHTML = `<div class="loading">Загрузка данных...</div>`;
  }

  try {
    const res = await fetch(url + "&_=" + Date.now());
    const text = await res.text();
    const json = JSON.parse(text.substr(47).slice(0, -2));
    const rows = json.table.rows || [];

    const oldDates = JSON.stringify(cache[tabId].dates);

    if (config.type.startsWith("schedule")) parseScheduleData(rows, tabId, config.type === "schedule-mini");
    else parseResultData(rows, tabId);

    // Сортировка Дат по убыванию
    cache[tabId].dates.sort((a, b) => parseToDateObj(b) - parseToDateObj(a));
    cache[tabId].loaded = true;
    
    const newDates = JSON.stringify(cache[tabId].dates);

    if (!isBackground || oldDates !== newDates) {
      buildSidebar(isBackground);
    } else {
      if (document.getElementById("searchInput").value.trim() !== "") handleSearch();
      else renderContent();
    }
  } catch (e) {
    if (!isBackground) {
      document.getElementById("data-container").innerHTML = `<div class="loading" style="color:#f43f5e;">Ошибка загрузки</div>`;
    }
  }
}

// ПАРСЕР ДЛЯ TAB 1 и TAB 3
function parseScheduleData(rows, tabId, isMini) {
  cache[tabId].dates = [];
  cache[tabId].byDate = {};

  rows.forEach(r => {
    let date = parseDate(getVal(r, 0));
    if (!date || date.toLowerCase().includes("дата")) return;

    let time = formatTime(getVal(r, 1)) || "--:--"; 
    let colD = getVal(r, 3); // Игрок 1 Имя
    let colE = getVal(r, 4); // Игрок 1 ID
    
    let colI = getVal(r, 8); // Игрок 2 Имя
    let colJ = getVal(r, 9); // Игрок 2 ID

    let isFreeSlot = false;

    if (isMini) {
      // Для МИНИ ПК: если пусто -> Свободный слот
      if (!colJ) { colJ = "Свободный слот"; isFreeSlot = true; colI = ""; }
      else if (colJ.toLowerCase() === "свободный слот") { isFreeSlot = true; }
    } else {
      // Для КОРОЛЕВСКОГО: если равно тексту "Свободный слот"
      if (colJ.toLowerCase() === "свободный слот") { isFreeSlot = true; }
    }

    let searchStr = `${colD} ${colE} ${colI} ${colJ}`.toLowerCase();

    if (!cache[tabId].byDate[date]) {
      cache[tabId].byDate[date] = [];
      cache[tabId].dates.push(date);
    }
    
    cache[tabId].byDate[date].push({ 
      time, p1_name: colD, p1_id: colE, p2_name: colI, p2_id: colJ, isFreeSlot, searchStr 
    });
  });

  // Сортировка внутри дня по Времени (возрастание)
  for (let d in cache[tabId].byDate) {
    cache[tabId].byDate[d].sort((a, b) => a.time.localeCompare(b.time));
  }
}

// ПАРСЕР ДЛЯ TAB 2
function parseResultData(rows, tabId) {
  cache[tabId].dates = [];
  cache[tabId].byDate = {};

  rows.forEach(r => {
    let date = parseDate(getVal(r, 0));
    if (!date || date.toLowerCase().includes("дата")) return;

    let colB = getVal(r, 1); // Игрок 1 (VS)
    let colD = getVal(r, 3); // Игрок 2 (VS)
    let winner = getVal(r, 4); // Победитель (Col E)
    let pointsNum = getNum(r, 5); // ПК Очки (число для сортировки)
    let pointsStr = getVal(r, 5); // ПК Очки (строка для вывода)
    let beans = getVal(r, 6); // Награда, бобы (Col G)

    let searchStr = `${colB} ${colD} ${winner}`.toLowerCase();

    if (!cache[tabId].byDate[date]) {
      cache[tabId].byDate[date] = [];
      cache[tabId].dates.push(date);
    }
    
    cache[tabId].byDate[date].push({ 
      colB, colD, winner, pointsNum, pointsStr, beans, searchStr 
    });
  });

  // Сортировка внутри дня по ПК Очкам (убывание)
  for (let d in cache[tabId].byDate) {
    cache[tabId].byDate[d].sort((a, b) => b.pointsNum - a.pointsNum);
  }
}

function buildSidebar(isBackground = false) {
  const dataRef = cache[currentTab];
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";

  if (dataRef.dates.length === 0) {
    document.getElementById("data-container").innerHTML = `<div class="loading">Нет данных</div>`;
    return;
  }

  if (!isBackground || !dataRef.dates.includes(selectedDate)) {
    selectedDate = dataRef.dates[0];
  }

  dataRef.dates.forEach((date) => {
    const btn = document.createElement("div");
    btn.className = "date-btn glass";
    if (date === selectedDate) btn.classList.add("active");
    btn.innerText = date;
    btn.onclick = () => selectDate(date);
    sidebar.appendChild(btn);
  });
  
  if (document.getElementById("searchInput").value.trim() !== "") handleSearch();
  else renderContent();
}

function selectDate(date) {
  selectedDate = date;
  document.getElementById("searchInput").value = ""; 
  
  document.querySelectorAll(".date-btn").forEach(btn => {
    btn.classList.toggle("active", btn.innerText === selectedDate);
  });
  renderContent();
}

function handleSearch() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  renderContent(q);
}

function renderContent(searchQuery = "") {
  const container = document.getElementById("data-container");
  const dataRef = cache[currentTab];
  const type = tabsConfig[currentTab].type;
  let html = "";

  if (searchQuery !== "") {
    const searchTerms = searchQuery.split(" ").filter(t => t !== "");
    let matches = [];

    dataRef.dates.forEach(d => {
      dataRef.byDate[d].forEach(item => {
        if (searchTerms.every(term => item.searchStr.includes(term))) {
          matches.push({ ...item, dateLabel: d });
        }
      });
    });

    if (matches.length === 0) {
      container.innerHTML = `<div class="loading">Ничего не найдено</div>`;
      return;
    }

    document.querySelectorAll(".date-btn").forEach(btn => btn.classList.remove("active"));
    html = renderItems(matches, type, true);

  } else {
    const data = dataRef.byDate[selectedDate] || [];
    if (data.length === 0) {
      container.innerHTML = `<div class="loading">Нет данных</div>`;
      return;
    }
    html = renderItems(data, type, false);
  }

  container.innerHTML = html;
}

function renderItems(items, type, showDate = false) {
  let html = "";

  if (type.startsWith("schedule")) {
    html += `<div class="schedule-list">`;
    items.forEach(m => {
      let dateBadge = showDate ? `<div class="date-badge">${m.dateLabel}</div>` : "";
      let p2BadgeClass = m.isFreeSlot ? "id-badge free-slot" : "id-badge";
      let p2IdText = m.isFreeSlot ? m.p2_id : `ID: ${m.p2_id}`;

      html += `
        <div class="match-row glass">
          ${dateBadge}
          <div class="team-block left">
            <span class="player-name">${m.p1_name || "---"}</span>
            <span class="id-badge">ID: ${m.p1_id || "---"}</span>
          </div>
          <div class="match-center">
            <div class="time-badge">${m.time}</div>
            <div class="vs-text">VS</div>
          </div>
          <div class="team-block right">
            <span class="player-name">${m.p2_name}</span>
            <span class="${p2BadgeClass}">${p2IdText}</span>
          </div>
        </div>`;
    });
    html += `</div>`;
  } 
  
  else if (type === "result") {
    html += `<div class="results-list">`;
    items.forEach(m => {
      let dateBadge = showDate ? `<div class="date-badge">${m.dateLabel}</div>` : "";
      
      html += `
        <div class="result-card glass">
          ${dateBadge}
          <div class="res-left">
            <div class="res-winner">👑 Победитель: <span>${m.winner || "---"}</span></div>
            <div class="res-vs">${m.colB || "---"} <span class="vs-red">VS</span> ${m.colD || "---"}</div>
          </div>
          <div class="res-right">
            <div class="stat-line">ПК очки: <span class="stat-val points">${m.pointsStr || "0"}</span></div>
            <div class="stat-line">Награда, бобы: <span class="stat-val beans">${m.beans || "0"}</span></div>
          </div>
        </div>`;
    });
    html += `</div>`;
  }

  return html;
}

// Запускаем
switchTab("sched-royal");
startAutoRefresh();
</script>
</body>
</html>
