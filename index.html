<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Семейная Лига BIGO</title>
    
    <!-- === ШРИФТ EXO 2 === -->
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* Цветовая палитра - Улучшена читабельность */
        :root {
            --bg-page: #0d1115;       
            --bg-table: rgba(33, 38, 45, 0.8); 
            
            --teal-dark: rgba(18, 63, 69, 0.9);     
            --teal-light: rgba(24, 108, 114, 0.9);    
            
            --orange: #f5a631;        
            --orange-bg: linear-gradient(135deg, #f5a631, #ff7a00); /* Градиент для кнопок */    
            
            --text-main: #ffffff; /* Чистый белый для главного текста */    
            --text-muted: #c9d1d9; /* Сделал серый светлее для отличной читабельности */   
            --border-line: rgba(245, 166, 49, 0.3); /* Оранжевые рамки */
        }
        
        * { box-sizing: border-box; font-family: 'Exo 2', sans-serif; }
        
        body { 
            background-image: 
                linear-gradient(rgba(13, 17, 21, 0.7), rgba(13, 17, 21, 0.85)), 
                url('https://i.ibb.co/xqnNLxj4/1vs1-1.jpg'); 
            background-size: cover;          
            background-position: center;     
            background-attachment: fixed;    
            background-repeat: no-repeat;
            background-color: var(--bg-page); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px 10px; 
            line-height: 1.6; 
        }
        
        .container { max-width: 800px; margin: 0 auto; }
        
        /* Шапка и Языки */
        .header { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .lang-switcher { display: flex; background: rgba(31, 41, 55, 0.8); border-radius: 20px; padding: 4px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);}
        .lang-btn { background: transparent; border: none; color: var(--text-muted); padding: 6px 18px; border-radius: 16px; cursor: pointer; font-weight: 800; font-size: 14px; transition: 0.3s; }
        .lang-btn.active { background: var(--orange-bg); color: #000; box-shadow: 0 0 10px rgba(245, 166, 49, 0.5);}

        /* =========================================
           НОВОЕ: ВЕРХНЯЯ КНОПКА (БАННЕР)
           ========================================= */
        #top-banner-container { margin-bottom: 25px; }
        .top-action-btn {
            display: block;
            background: var(--orange-bg);
            color: #000;
            padding: 16px 20px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            font-weight: 800;
            font-size: 18px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(245, 166, 49, 0.4);
            border: 1px solid rgba(255,255,255,0.3);
            transition: 0.3s;
            animation: fadeIn 0.5s ease;
        }
        .top-action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(245, 166, 49, 0.7);
        }

        /* =========================================
           ГЛАВНОЕ МЕНЮ 
           ========================================= */
        .main-menu { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; }
        .main-btn { 
            background-color: var(--teal-dark); 
            color: var(--text-muted); 
            border: none; 
            font-size: 20px; 
            font-weight: 800; 
            text-transform: uppercase;
            cursor: pointer; 
            padding: 16px 40px; 
            border-radius: 8px; 
            transition: 0.3s; 
            text-align: center; 
            position: relative;
            min-width: 200px; 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .main-btn.active { 
            background-color: var(--teal-light); 
            color: var(--orange); 
            border-bottom: 5px solid var(--orange);
            border-bottom-left-radius: 4px;
            border-bottom-right-radius: 4px;
            text-shadow: 0 0 10px rgba(245, 166, 49, 0.3);
        }

        /* Основная карточка */
        .content-area { 
            background-color: rgba(24, 29, 35, 0.85); 
            backdrop-filter: blur(12px);              
            -webkit-backdrop-filter: blur(12px);      
            border: 1px solid var(--border-line); 
            border-radius: 16px; 
            padding: 30px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            animation: fadeIn 0.4s ease; 
        }

        /* =========================================
           ПОДМЕНЮ 
           ========================================= */
        .tabs-wrapper { display: flex; justify-content: center; width: 100%; margin-bottom: 15px; }
        #tabs-container { display: inline-flex; background-color: var(--teal-light); border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);}
        .tab-btn { background: transparent; border: none; color: var(--text-muted); font-size: 16px; font-weight: 800; padding: 14px 45px; cursor: pointer; transition: 0.3s; text-align: center; }
        .tab-btn.active { background: var(--orange-bg); color: #000; text-shadow: none;}

        #subtabs-container { display: flex; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center; }
        .subtab-btn { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 600; text-align: center; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); transition: 0.3s;}
        .subtab-btn.active { border-color: var(--orange); color: var(--orange); box-shadow: inset 0 0 10px rgba(245, 166, 49, 0.2);}

        /* =========================================
           ЗАГОЛОВКИ И ТЕКСТ 
           ========================================= */
        .cal-title { color: var(--orange); font-size: 22px; margin: 20px 0 15px 0; font-weight: 800; text-align: left; }
        .rule-text, .cal-text { color: var(--text-main); font-size: 16px; margin-bottom: 15px; text-align: left; font-weight: 400;}
        .main-title { font-size: 24px; color: var(--orange); margin-bottom: 20px; text-align: center; font-weight: 800; text-transform: uppercase;}
        .text-center { text-align: center !important; }
        .text-left { text-align: left !important; }

        /* =========================================
           ТАБЛИЦЫ 
           ========================================= */
        .data-table-wrapper { 
            background-color: var(--bg-table); 
            border: 1px solid var(--border-line);
            border-radius: 12px; 
            overflow-x: auto; 
            margin-bottom: 25px;
            padding: 5px 15px;
        }
        .data-table { width: 100%; border-collapse: collapse; font-size: 16px; }
        .data-table th, .data-table td { padding: 14px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); white-space: nowrap; text-align: center; vertical-align: middle; }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table th { color: var(--orange); font-size: 13px; font-weight: 800; text-transform: uppercase;}
        .data-table td:nth-child(3) { color: var(--text-main); font-weight: 800; }
        .data-table td:nth-child(1), .data-table td:nth-child(2) { color: var(--text-muted); font-weight: 600;}
        
        .cell-img { max-width: 40px; max-height: 40px; vertical-align: middle; margin: 0 auto; display: block;}
        .action-button { display: inline-block; text-align: center; background: var(--teal-light); color: white; padding: 12px 30px; border-radius: 8px; text-decoration: none; font-weight: 800; margin-top: 10px; border: 1px solid rgba(255,255,255,0.2);}
        
        #loader { text-align: center; color: var(--orange); padding: 50px; font-size: 18px; font-weight: 800; letter-spacing: 1px;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* =========================================
           НОВОЕ: КАРТОЧКА СЕМЬИ (ВНИЗУ)
           ========================================= */
        #bottom-card-container { margin-top: 30px; }
        .family-card {
            background-color: rgba(24, 29, 35, 0.85); 
            backdrop-filter: blur(12px);              
            -webkit-backdrop-filter: blur(12px);      
            border: 1px solid var(--border-line); 
            border-radius: 16px; 
            padding: 20px; 
            display: flex;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 0 15px rgba(245, 166, 49, 0.05); 
            animation: fadeIn 0.8s ease;
        }
        
        /* === УВЕЛИЧЕННАЯ КАРТИНКА === */
        .family-avatar {
            width: 100px;  /* Было 70px, стало 100px */
            height: 100px; /* Было 70px, стало 100px */
            border-radius: 50%;
            border: 3px solid var(--orange); /* Сделал рамку чуть толще */
            object-fit: cover;
            margin-right: 25px; /* Немного увеличил отступ от текста */
            background-color: var(--teal-dark);
            box-shadow: 0 0 15px rgba(245, 166, 49, 0.4); /* Добавил легкое свечение */
        }
        
        .family-info { display: flex; flex-direction: column; justify-content: center;}
        .family-desc { color: var(--text-muted); font-size: 14px; font-weight: 600; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px;}
        .family-name { color: var(--orange); font-size: 24px; font-weight: 800; text-shadow: 0 0 10px rgba(245, 166, 49, 0.3);}

        /* =========================================
           МОБИЛЬНАЯ АДАПТАЦИЯ
           ========================================= */
        @media (max-width: 600px) {
            body { padding: 15px 10px; }
            .content-area { padding: 20px 15px; border-radius: 12px; }
            
            .main-menu { gap: 6px; flex-wrap: nowrap; }
            .main-btn { font-size: 13px; padding: 12px 5px; border-bottom-width: 4px; min-width: unset; flex: 1; }
            
            .tabs-wrapper { display: flex; }
            #tabs-container { display: flex; width: 100%; }
            .tab-btn { font-size: 14px; padding: 10px 5px; flex: 1; }
            
            .cal-title { font-size: 18px; }
            .rule-text, .cal-text { font-size: 14px; }
            
            .data-table { font-size: 13px; }
            .data-table th { font-size: 11px; padding: 10px 5px;}
            .data-table td { padding: 12px 5px; }
            .data-table-wrapper { padding: 0 10px; border-radius: 8px;}

            .top-action-btn { font-size: 15px; padding: 14px 10px; }
            
            /* === УВЕЛИЧЕННАЯ КАРТИНКА (МОБИЛЬНЫЕ) === */
            .family-avatar { 
                width: 80px;  /* Было 55px, стало 80px */
                height: 80px; /* Было 55px, стало 80px */
                margin-right: 15px;
            }
            .family-name { font-size: 20px; }
            .family-desc { font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="setLang('RU')">RU</button>
            <button class="lang-btn" onclick="setLang('UZ')">UZ</button>
        </div>
    </div>

    <!-- НОВОЕ: ВЕРХНИЙ БАННЕР -->
    <div id="top-banner-container"></div>

    <div class="main-menu" id="main-menu" style="display: none;">
        <button class="main-btn active" onclick="switchMainTab('Rewards')">Награды</button>
        <button class="main-btn" onclick="switchMainTab('Calendar')">Календарь</button>
        <button class="main-btn" onclick="switchMainTab('Rules')">Правила</button>
    </div>
    
    <div id="loader">Загрузка данных... ⏳</div>

    <div class="content-area" id="content-container" style="display: none;">
        <div id="rewards-nav" style="display: none;">
            <div class="tabs-wrapper">
                <div id="tabs-container"></div>
            </div>
            <div id="subtabs-container"></div>
        </div>
        <div id="dynamic-content"></div>
    </div>

    <!-- НОВОЕ: КАРТОЧКА СЕМЬИ ВНИЗУ -->
    <div id="bottom-card-container"></div>
</div>

<script>
    const sheetId = '1P_2Vko2-RA4VXFCqzMYE20hp5MjJsQ4zh_bU0ohYbII';
    const GIDS = { 'Rewards': '1090262398', 'Calendar': '691237427', 'Rules': '0', 'Settings': '1122641331' };

    let allData = { 'Rewards': [], 'Calendar': [], 'Rules': [], 'Settings': [] };
    let parsedRewards = { 'RU': {}, 'UZ': {} }; 
    
    let currentLang = 'RU';
    let currentMainTab = 'Rewards';
    let currentActiveTab = '';    
    let currentActiveSubtab = ''; 

    const getCol = (row, index) => (row && row[index]) ? row[index].trim() : '';

    async function fetchAllData() {
        try {
            const promises = Object.keys(GIDS).map(async (tabName) => {
                const url = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${GIDS[tabName]}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error();
                const text = await res.text();
                allData[tabName] = parseCSV(text);
            });

            await Promise.all(promises);
            prepareRewardsData(); 
            initUI();
        } catch (error) {
            document.getElementById('loader').innerText = '❌ Ошибка загрузки. Обновите страницу.';
        }
    }

    function parseCSV(csv) {
        const rows = [];
        let row = [], col = "", inQ = false;
        for (let i = 0; i < csv.length; i++) {
            let c = csv[i], nc = csv[i+1];
            if (c === '"' && inQ && nc === '"') { col += '"'; i++; }
            else if (c === '"') inQ = !inQ;
            else if (c === ',' && !inQ) { row.push(col.trim()); col = ""; }
            else if ((c === '\n' || c === '\r') && !inQ) {
                if (c === '\r' && nc === '\n') i++;
                row.push(col.trim()); rows.push(row); row = []; col = "";
            } else col += c;
        }
        if (col || row.length) { row.push(col.trim()); rows.push(row); }
        return rows;
    }

    function prepareRewardsData() {
        const rows = allData['Rewards'];
        let lastRuTab = '', lastRuSub = '';
        let lastUzTab = '', lastUzSub = '';

        for (let i = 1; i < rows.length; i++) { 
            const r = rows[i];
            
            let rTab = getCol(r, 0); if (rTab) lastRuTab = rTab;
            let rSub = getCol(r, 1); if (rSub) lastRuSub = rSub;
            let rC1 = getCol(r, 2), rC2 = getCol(r, 3), rC3 = getCol(r, 4);
            
            if (lastRuTab && lastRuSub && (rC1 || rC2 || rC3)) {
                if (!parsedRewards['RU'][lastRuTab]) parsedRewards['RU'][lastRuTab] = {};
                if (!parsedRewards['RU'][lastRuTab][lastRuSub]) parsedRewards['RU'][lastRuTab][lastRuSub] = [];
                parsedRewards['RU'][lastRuTab][lastRuSub].push({ c1: rC1, c2: rC2, c3: rC3 });
            }

            let uTab = getCol(r, 5); if (uTab) lastUzTab = uTab;
            let uSub = getCol(r, 6); if (uSub) lastUzSub = uSub;
            let uC1 = getCol(r, 7), uC2 = getCol(r, 8), uC3 = getCol(r, 9);
            
            if (lastUzTab && lastUzSub && (uC1 || uC2 || uC3)) {
                if (!parsedRewards['UZ'][lastUzTab]) parsedRewards['UZ'][lastUzTab] = {};
                if (!parsedRewards['UZ'][lastUzTab][lastUzSub]) parsedRewards['UZ'][lastUzTab][lastUzSub] = [];
                parsedRewards['UZ'][lastUzTab][lastUzSub].push({ c1: uC1, c2: uC2, c3: uC3 });
            }
        }
    }

    function initUI() {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('main-menu').style.display = 'flex';
        renderStaticElements(); 
        switchMainTab('Rewards');
    }

    function setLang(lang) {
        const oldLang = currentLang;
        currentLang = lang;
        
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        const mainBtns = document.querySelectorAll('.main-btn');
        mainBtns[0].innerText = lang === 'RU' ? 'НАГРАДЫ' : 'MUKOFOTLAR';
        mainBtns[1].innerText = lang === 'RU' ? 'КАЛЕНДАРЬ' : 'KALENDAR';
        mainBtns[2].innerText = lang === 'RU' ? 'ПРАВИЛА' : 'QOIDALAR';

        renderStaticElements(); 

        if (currentMainTab === 'Rewards') {
            const oldTabs = Object.keys(parsedRewards[oldLang] || {});
            const newTabs = Object.keys(parsedRewards[lang] || {});
            const tabIdx = oldTabs.indexOf(currentActiveTab);
            
            currentActiveTab = (tabIdx !== -1 && newTabs[tabIdx]) ? newTabs[tabIdx] : newTabs[0];

            if (currentActiveTab) {
                const oldSubtabs = Object.keys(parsedRewards[oldLang][oldTabs[tabIdx]] || {});
                const newSubtabs = Object.keys(parsedRewards[lang][currentActiveTab] || {});
                const subIdx = oldSubtabs.indexOf(currentActiveSubtab);
                currentActiveSubtab = (subIdx !== -1 && newSubtabs[subIdx]) ? newSubtabs[subIdx] : newSubtabs[0];
            }
            renderRewardsNav();
        } else {
            renderCurrentView();
        }
    }

    // ==========================================
    // ФУНКЦИЯ ДЛЯ ВЕРХНЕЙ КНОПКИ И НИЖНЕЙ КАРТОЧКИ
    // ==========================================
    function renderStaticElements() {
        const rows = allData['Settings'];
        if (!rows || rows.length < 6) return; 

        const isRU = currentLang === 'RU';

        // 1. ВЕРХНЯЯ КНОПКА
        const topText = isRU ? getCol(rows[1], 1) : getCol(rows[1], 2); // B2 / C2
        const topLink = isRU ? getCol(rows[2], 1) : getCol(rows[2], 2); // B3 / C3

        const topContainer = document.getElementById('top-banner-container');
        if (topText && topLink) {
            topContainer.innerHTML = `<a href="${topLink}" target="_blank" class="top-action-btn">${topText}</a>`;
        } else {
            topContainer.innerHTML = ''; 
        }

        // 2. НИЖНЯЯ КАРТОЧКА СЕМЬИ
        const cardDesc = isRU ? getCol(rows[3], 1) : getCol(rows[3], 2); // B4 / C4
        const cardName = isRU ? getCol(rows[4], 1) : getCol(rows[4], 2); // B5 / C5
        const cardImg  = isRU ? getCol(rows[5], 1) : getCol(rows[5], 2); // B6 / C6

        const bottomContainer = document.getElementById('bottom-card-container');
        if (cardDesc || cardName) {
            const imgSrc = cardImg || 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='; 
            
            bottomContainer.innerHTML = `
                <div class="family-card">
                    <img src="${imgSrc}" class="family-avatar" alt="Avatar" onerror="this.style.display='none'">
                    <div class="family-info">
                        <div class="family-desc">${cardDesc}</div>
                        <div class="family-name">${cardName}</div>
                    </div>
                </div>
            `;
        } else {
            bottomContainer.innerHTML = ''; 
        }
    }

    function switchMainTab(tab) {
        currentMainTab = tab;
        document.querySelectorAll('.main-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('content-container').style.display = 'block';
        document.getElementById('rewards-nav').style.display = (tab === 'Rewards') ? 'block' : 'none';
        
        if (tab === 'Rewards') {
            const tabs = Object.keys(parsedRewards[currentLang] || {});
            if (!currentActiveTab || !tabs.includes(currentActiveTab)) currentActiveTab = tabs[0];
            renderRewardsNav();
        } else {
            renderCurrentView();
        }
    }

    function renderCurrentView() {
        if (currentMainTab === 'Rewards') renderRewardsContent();
        else if (currentMainTab === 'Calendar') renderCalendarContent();
        else if (currentMainTab === 'Rules') renderRulesContent();
    }

    function renderRewardsNav() {
        const tabsContainer = document.getElementById('tabs-container');
        const subtabsContainer = document.getElementById('subtabs-container');
        tabsContainer.innerHTML = ''; subtabsContainer.innerHTML = '';

        const tabs = Object.keys(parsedRewards[currentLang] || {});
        tabs.forEach(tab => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (tab === currentActiveTab ? ' active' : '');
            btn.innerText = tab;
            btn.onclick = () => { currentActiveTab = tab; currentActiveSubtab = Object.keys(parsedRewards[currentLang][tab])[0]; renderRewardsNav(); };
            tabsContainer.appendChild(btn);
        });

        if (currentActiveTab && parsedRewards[currentLang][currentActiveTab]) {
            const subtabs = Object.keys(parsedRewards[currentLang][currentActiveTab]);
            if (!currentActiveSubtab || !subtabs.includes(currentActiveSubtab)) currentActiveSubtab = subtabs[0];
            
            if (!(subtabs.length === 1 && subtabs[0] === "")) {
                subtabs.forEach(sub => {
                    const btn = document.createElement('button');
                    btn.className = 'subtab-btn' + (sub === currentActiveSubtab ? ' active' : '');
                    btn.innerText = sub;
                    btn.onclick = () => { currentActiveSubtab = sub; renderRewardsNav(); };
                    subtabsContainer.appendChild(btn);
                });
            }
        }
        renderCurrentView();
    }

    function renderRewardsContent() {
        const tabData = parsedRewards[currentLang][currentActiveTab] || {};
        const rows = tabData[currentActiveSubtab] || [];
        
        let html = '';
        let inFullTable = false, inMiniTable = false;

        const fmt = (text) => {
            if (!text) return '';
            if (text.startsWith('http')) return `<img src="${text}" class="cell-img" alt="img">`;
            return text.replace(/\n/g, '<br>');
        };

        rows.forEach((row) => {
            let { c1, c2, c3 } = row;

            if (c1 && c2 && c3) {
                if (inMiniTable) { html += '</table></div>'; inMiniTable = false; }
                if (!inFullTable) { 
                    html += `<div class="data-table-wrapper"><table class="data-table">`; 
                    inFullTable = true;
                    html += `<tr><th>${fmt(c1)}</th><th>${fmt(c2)}</th><th>${fmt(c3)}</th></tr>`;
                } else {
                    html += `<tr><td>${fmt(c1)}</td><td>${fmt(c2)}</td><td>${fmt(c3)}</td></tr>`;
                }
            } else if (!c1 && c2 && c3) {
                if (inFullTable) { html += '</table></div>'; inFullTable = false; }
                if (!inMiniTable) { 
                    html += `<div class="data-table-wrapper"><table class="data-table" style="max-width:500px; margin: 0 auto;">`; 
                    inMiniTable = true; 
                }
                html += `<tr><td style="border-bottom:none;">${fmt(c2)}</td><td style="border-bottom:none;">${fmt(c3)}</td></tr>`;
            } else {
                if (inFullTable) { html += '</table></div>'; inFullTable = false; }
                if (inMiniTable) { html += '</table></div>'; inMiniTable = false; }
                
                if (c1) html += `<div class="cal-title">${c1}</div>`;
                if (c2) html += `<div class="rule-text">${fmt(c2)}</div>`;
            }
        });

        if (inFullTable || inMiniTable) html += `</table></div>`;
        document.getElementById('dynamic-content').innerHTML = html || `<div class="rule-text">Данные отсутствуют.</div>`;
    }

    function renderCalendarContent() {
        const rows = allData['Calendar'];
        let html = '';
        let hasData = false;
        
        rows.forEach((row, idx) => {
            if (idx === 0) return; 
            let title = currentLang === 'RU' ? getCol(row, 0) : getCol(row, 2);
            let value = currentLang === 'RU' ? getCol(row, 1) : getCol(row, 3);

            if (!title && !value) return;
            hasData = true;

            if (title) html += `<div class="cal-title text-center" style="font-size:18px;">${title}</div>`;
            
            if (value) {
                let alignClass = (idx === 1) ? 'text-left' : 'text-center';

                if (value.startsWith('http')) {
                    const btnText = currentLang === 'RU' ? 'перейти на страницу' : 'sahifaga o'tish';
                    html += `<div class="${alignClass}"><a href="${value}" target="_blank" class="action-button">${btnText}</a></div>`;
                } else {
                    html += `<div class="cal-text ${alignClass}">${value.replace(/\n/g, '<br>')}</div>`;
                }
            }
            html += `<hr style="border: 0; border-bottom: 1px solid var(--border-line); margin: 15px 0;">`;
        });
        
        document.getElementById('dynamic-content').innerHTML = hasData ? html : `<div class="rule-text text-center">Календарь пока пуст.</div>`;
    }

    function renderRulesContent() {
        const rows = allData['Rules'];
        let html = '';
        let hasData = false;
        
        rows.forEach((row, idx) => {
            if (idx === 0) return; 
            let title = currentLang === 'RU' ? getCol(row, 0) : getCol(row, 2); 
            let text = currentLang === 'RU' ? getCol(row, 1) : getCol(row, 3);

            if (!title && !text) return;
            hasData = true;

            if (idx === 1) { 
                html += `<div class="main-title">${title}</div>`;
                if (text) html += `<div class="rule-text" style="margin-bottom:25px;">${text.replace(/\n/g, '<br>')}</div>`;
            } else {
                if (title) html += `<div class="cal-title" style="font-size:18px;">${title}</div>`;
                if (text) html += `<div class="rule-text">${text.replace(/\n/g, '<br>')}</div>`;
            }
        });
        
        document.getElementById('dynamic-content').innerHTML = hasData ? html : `<div class="rule-text">Правила формируются.</div>`;
    }

    fetchAllData();
</script>
</body>
</html>
