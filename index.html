<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Семейный Май-Фест</title>
  
  <style>
    /* ================= БАЗОВЫЕ СТИЛИ И ДИЗАЙН ================= */
    :root {
      --bg-color: #0f172a;
      --text-color: #f8fafc;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent-color: #3b82f6;
    }
    
    body {
      margin: 0; padding: 20px;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }

    #app {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Заголовки (title) */
    .title-block {
      font-size: 24px;
      font-weight: bold;
      margin-top: 30px;
      margin-bottom: 15px;
      color: var(--accent-color);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Обычный текст (text) */
    .text-block {
      font-size: 16px;
      margin-bottom: 15px;
      background: var(--glass-bg);
      padding: 15px;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
    }

    /* Обычная таблица (table) */
    .table-block {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 15px;
    }
    .table-block td {
      border: 1px solid var(--glass-border);
      padding: 10px;
      text-align: center;
    }

    /* ================= НОВЫЙ БЛОК: ТЕКСТ + КАРТИНКА (text-image) ================= */
    .text-image-block { 
      background: var(--glass-bg); 
      backdrop-filter: blur(12px); 
      border: 1px solid var(--glass-border); 
      border-radius: 12px; 
      padding: 20px; 
      display: flex; 
      align-items: center; 
      gap: 20px; 
      margin-bottom: 15px; 
      box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
    }
    .text-image-content { flex: 1; font-size: 16px; font-weight: 600; }
    .text-image-img { max-width: 150px; border-radius: 10px; object-fit: cover; }

    @media (max-width: 768px) {
      .text-image-block { flex-direction: column; text-align: center; }
      .text-image-img { max-width: 100%; height: auto; }
    }

    /* ================= НОВЫЙ БЛОК: ВИТРИНА ПОДАРКОВ (таблица-карточка) ================= */
    .gift-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    .gift-card {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 15px;
      padding: 15px 10px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }
    .gift-card:hover {
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.08);
    }
    .gift-img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 10px;
    }
    .gift-name {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      line-height: 1.2;
    }

    /* Анимация загрузки */
    .loader { text-align: center; font-size: 18px; margin-top: 50px; color: #94a3b8; }
  </style>
</head>

<body>
  <!-- Здесь появится контент из таблицы -->
  <div id="app">
    <div class="loader">Загрузка данных из таблицы... ⏳</div>
  </div>

  <script>
    // Запрос данных из Google Таблицы
    google.script.run
      .withSuccessHandler(renderContent)
      .getTableData(); // Убедитесь, что функция в Code.gs называется именно так

    // Главная функция отрисовки
    function renderContent(data) {
      const app = document.getElementById("app");
      app.innerHTML = ""; // Очищаем надпись "Загрузка..."

      // Перебираем каждую строку, пришедшую из таблицы
      data.forEach(row => {
        let type = row.type ? row.type.toLowerCase().trim() : "";
        let content = row.content ? row.content.trim() : "";
        let html = "";

        if (!content) return; // Если ячейка пустая - пропускаем

        // 1. Заголовки (title)
        if (type.includes("title")) {
          html = `<div class="title-block">${content}</div>`;
        } 
        
        // 2. Обычный текст (text)
        else if (type === "text") {
          html = `<div class="text-block">${content}</div>`;
        } 
        
        // 3. Текст + Картинка (text-image)
        // Пример в таблице: Текст описания | https://ссылка-на-фото.jpg
        else if (type === "text-image") {
          let parts = content.split("|");
          let textPart = parts[0] ? parts[0].trim() : "";
          let imgPart = parts[1] ? parts[1].trim() : "";
          
          html = `
            <div class="text-image-block">
              ${imgPart ? `<img src="${imgPart}" class="text-image-img" alt="img">` : ''}
              <div class="text-image-content">${textPart}</div>
            </div>
          `;
        } 
        
        // 4. ВИТРИНА ПОДАРКОВ (таблица-карточка)
        // Пример в таблице: Чайная церемония<br> ссылка, Сумалак<br> ссылка
        else if (type === "таблица-карточка") {
          let items = content.split(","); // Разбиваем по запятой на отдельные подарки
          let cardsHtml = "";
          
          items.forEach(item => {
            let parts = item.split("<br>"); // Разбиваем внутри подарка на имя и фото
            let name = parts[0] ? parts[0].trim() : "";
            let imgUrl = parts[1] ? parts[1].trim() : "";
            
            if (name || imgUrl) {
              cardsHtml += `
                <div class="gift-card">
                  ${imgUrl ? `<img src="${imgUrl}" class="gift-img" alt="подарок">` : ''}
                  <div class="gift-name">${name}</div>
                </div>
              `;
            }
          });
          html = `<div class="gift-grid">${cardsHtml}</div>`;
        } 

        // 5. Обычная таблица в ряд (table)
        // Пример в таблице: Слово 1, Слово 2, Слово 3
        else if (type === "table") {
          let cells = content.split(",").map(c => `<td>${c.trim()}</td>`).join('');
          html = `<table class="table-block"><tr>${cells}</tr></table>`;
        }

        // Если тип не распознан, выводим как обычный текст
        else {
          html = `<div class="text-block">${content}</div>`;
        }

        // Вставляем готовый блок на сайт (сохраняя принадлежность к LangBlock)
        let wrapper = document.createElement("div");
        wrapper.setAttribute("data-block", row.block);
        wrapper.innerHTML = html;
        app.appendChild(wrapper);
      });
    }
  </script>
</body>
</html>
